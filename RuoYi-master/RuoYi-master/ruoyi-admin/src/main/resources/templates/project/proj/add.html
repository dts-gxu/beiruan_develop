<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<th:block th:include="include :: header('新增项目')" />
</head>
<body class="white-bg">
	<div class="wrapper wrapper-content animated fadeInRight ibox-content">
		<form class="form-horizontal m" id="form-project-add">
			<div class="form-group">
				<label class="col-sm-3 control-label is-required">项目名称：</label>
				<div class="col-sm-8">
					<input name="projectName" class="form-control" type="text" required>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label is-required">项目状态：</label>
				<div class="col-sm-8">
					<select name="projectStatus" class="form-control m-b" th:with="type=${@dict.getType('proj_project_status')}">
						<option th:each="dict : ${type}" th:text="${dict.dictLabel}" th:value="${dict.dictValue}"></option>
					</select>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label is-required">负责人：</label>
				<div class="col-sm-8">
					<input name="manager" class="form-control" type="text" required>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label is-required">优先级：</label>
				<div class="col-sm-8">
					<select name="priority" class="form-control m-b" th:with="type=${@dict.getType('proj_priority')}">
						<option th:each="dict : ${type}" th:text="${dict.dictLabel}" th:value="${dict.dictValue}"></option>
					</select>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label">开始日期：</label>
				<div class="col-sm-8">
					<input name="startDate" class="form-control" type="text" placeholder="yyyy-MM-dd" onclick="layui.use('laydate', function(){layui.laydate.render({elem: this, type: 'date'})})">
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label">结束日期：</label>
				<div class="col-sm-8">
					<input name="endDate" class="form-control" type="text" placeholder="yyyy-MM-dd" onclick="layui.use('laydate', function(){layui.laydate.render({elem: this, type: 'date'})})">
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label">项目描述：</label>
				<div class="col-sm-8">
					<textarea name="description" class="form-control" rows="3"></textarea>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label">备注：</label>
				<div class="col-sm-8">
					<textarea name="remark" class="form-control" rows="2"></textarea>
				</div>
			</div>
		</form>
	</div>
	<th:block th:include="include :: footer" />
	<script th:inline="javascript">
		var prefix = ctx + "project/proj";
		$("#form-project-add").validate({
			focusCleanup: true
		});

		function submitHandler() {
			if ($.validate.form()) {
				$.operate.save(prefix + "/add", $('#form-project-add').serialize());
			}
		}
	</script>
</body>
</html>
