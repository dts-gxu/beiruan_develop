<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<th:block th:include="include :: header('任务列表')" />
</head>
<body class="gray-bg">
     <div class="container-div">
		<div class="row">
			<div class="col-sm-12 search-collapse">
				<form id="task-form">
					<div class="select-list">
						<ul>
							<li>
								任务名称：<input type="text" name="taskName"/>
							</li>
							<li>
								所属项目：<select name="projectId">
									<option value="">所有</option>
								</select>
							</li>
							<li>
								任务状态：<select name="taskStatus" th:with="type=${@dict.getType('proj_task_status')}">
									<option value="">所有</option>
									<option th:each="dict : ${type}" th:text="${dict.dictLabel}" th:value="${dict.dictValue}"></option>
								</select>
							</li>
							<li>
								负责人：<input type="text" name="assignee"/>
							</li>
							<li>
								优先级：<select name="priority" th:with="type=${@dict.getType('proj_priority')}">
									<option value="">所有</option>
									<option th:each="dict : ${type}" th:text="${dict.dictLabel}" th:value="${dict.dictValue}"></option>
								</select>
							</li>
							<li class="select-time">
								<label>截止日期： </label>
								<input type="text" class="time-input" id="startDueDate" placeholder="开始日期" name="params[beginDueDate]"/>
								<span>-</span>
								<input type="text" class="time-input" id="endDueDate" placeholder="结束日期" name="params[endDueDate]"/>
							</li>
							<li>
								<a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
								<a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
							</li>
						</ul>
					</div>
				</form>
			</div>

	        <div class="btn-group-sm" id="toolbar" role="group">
		        <a class="btn btn-success" onclick="$.operate.add()" shiro:hasPermission="project:task:add">
		            <i class="fa fa-plus"></i> 新增
		        </a>
		        <a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="project:task:edit">
		            <i class="fa fa-edit"></i> 修改
		        </a>
		        <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="project:task:remove">
		            <i class="fa fa-remove"></i> 删除
		        </a>
		        <a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="project:task:export">
		            <i class="fa fa-download"></i> 导出
		        </a>
	        </div>
	        <div class="col-sm-12 select-table table-striped">
	            <table id="bootstrap-table"></table>
	        </div>
	    </div>
	</div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var editFlag = [[${@permission.hasPermi('project:task:edit')}]];
        var removeFlag = [[${@permission.hasPermi('project:task:remove')}]];
        var statusDatas = [[${@dict.getType('proj_task_status')}]];
        var priorityDatas = [[${@dict.getType('proj_priority')}]];
        var prefix = ctx + "project/task";

        $(function() {
            loadProjects();

            var options = {
                url: prefix + "/list",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
                exportUrl: prefix + "/export",
                sortName: "taskId",
		        sortOrder: "desc",
                modalName: "任务",
                columns: [{
                    checkbox: true
                },
                {
                    field: 'taskId',
                    title: '任务ID'
                },
                {
                    field: 'taskName',
                    title: '任务名称',
                    formatter: function(value, row, index) {
                        return $.table.tooltip(value);
                    }
                },
                {
                    field: 'projectName',
                    title: '所属项目',
                    align: 'center'
                },
                {
                    field: 'taskStatus',
                    title: '任务状态',
                    align: 'center',
                    formatter: function(value, row, index) {
                        return $.table.selectDictLabel(statusDatas, value);
                    }
                },
                {
                    field: 'priority',
                    title: '优先级',
                    align: 'center',
                    formatter: function(value, row, index) {
                        return $.table.selectDictLabel(priorityDatas, value);
                    }
                },
                {
                    field: 'assignee',
                    title: '负责人',
                    align: 'center'
                },
                {
                    field: 'dueDate',
                    title: '截止日期',
                    align: 'center',
                    formatter: function(value, row, index) {
                        if (!value) return '';
                        var isOverdue = row.taskStatus === '0' || row.taskStatus === '1';
                        if (isOverdue && new Date(value) < new Date()) {
                            return '<span style="color:red;font-weight:bold">' + value + '</span>';
                        }
                        return value;
                    }
                },
                {
                    field: 'completeDate',
                    title: '完成日期',
                    align: 'center'
                },
                {
                    field: 'createTime',
                    title: '创建时间',
                    align: 'center'
                },
                {
                    title: '操作',
                    align: 'center',
                    formatter: function(value, row, index) {
                        var actions = [];
                        actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.taskId + '\')"><i class="fa fa-edit"></i>编辑</a> ');
                        actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.taskId + '\')"><i class="fa fa-remove"></i>删除</a>');
                        return actions.join('');
                    }
                }]
            };
            $.table.init(options);
        });

        /** 加载项目下拉列表 */
        function loadProjects() {
            $.ajax({
                url: ctx + "project/proj/list",
                type: "post",
                success: function(res) {
                    var select = $("select[name='projectId']");
                    if (res.rows) {
                        $.each(res.rows, function(i, item) {
                            select.append('<option value="' + item.projectId + '">' + item.projectName + '</option>');
                        });
                    }
                }
            });
        }
    </script>
</body>
</html>
