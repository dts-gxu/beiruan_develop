<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<th:block th:include="include :: header('修改任务')" />
</head>
<body class="white-bg">
	<div class="wrapper wrapper-content animated fadeInRight ibox-content">
		<form class="form-horizontal m" id="form-task-edit" th:object="${task}">
			<input name="taskId" th:field="*{taskId}" type="hidden">
			<div class="form-group">
				<label class="col-sm-3 control-label is-required">任务名称：</label>
				<div class="col-sm-8">
					<input name="taskName" th:field="*{taskName}" class="form-control" type="text" required>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label is-required">所属项目：</label>
				<div class="col-sm-8">
					<select name="projectId" class="form-control m-b" required>
						<option th:each="project : ${projects}" th:text="${project.projectName}" th:value="${project.projectId}" th:field="*{projectId}"></option>
					</select>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label is-required">任务状态：</label>
				<div class="col-sm-8">
					<select name="taskStatus" class="form-control m-b" th:with="type=${@dict.getType('proj_task_status')}">
						<option th:each="dict : ${type}" th:text="${dict.dictLabel}" th:value="${dict.dictValue}" th:field="*{taskStatus}"></option>
					</select>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label is-required">优先级：</label>
				<div class="col-sm-8">
					<select name="priority" class="form-control m-b" th:with="type=${@dict.getType('proj_priority')}">
						<option th:each="dict : ${type}" th:text="${dict.dictLabel}" th:value="${dict.dictValue}" th:field="*{priority}"></option>
					</select>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label is-required">负责人：</label>
				<div class="col-sm-8">
					<input name="assignee" th:field="*{assignee}" class="form-control" type="text" required>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label">截止日期：</label>
				<div class="col-sm-8">
					<input name="dueDate" th:value="${#dates.format(task.dueDate, 'yyyy-MM-dd')}" class="form-control" type="text" placeholder="yyyy-MM-dd" onclick="layui.use('laydate', function(){layui.laydate.render({elem: this, type: 'date'})})">
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label">完成日期：</label>
				<div class="col-sm-8">
					<input name="completeDate" th:value="${#dates.format(task.completeDate, 'yyyy-MM-dd')}" class="form-control" type="text" placeholder="yyyy-MM-dd" onclick="layui.use('laydate', function(){layui.laydate.render({elem: this, type: 'date'})})">
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label">任务描述：</label>
				<div class="col-sm-8">
					<textarea name="description" class="form-control" rows="3" th:text="*{description}"></textarea>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label">备注：</label>
				<div class="col-sm-8">
					<textarea name="remark" class="form-control" rows="2" th:text="*{remark}"></textarea>
				</div>
			</div>
		</form>
	</div>
	<th:block th:include="include :: footer" />
	<script th:inline="javascript">
		var prefix = ctx + "project/task";
		$("#form-task-edit").validate({
			focusCleanup: true
		});

		function submitHandler() {
			if ($.validate.form()) {
				$.operate.save(prefix + "/edit", $('#form-task-edit').serialize());
			}
		}
	</script>
</body>
</html>
