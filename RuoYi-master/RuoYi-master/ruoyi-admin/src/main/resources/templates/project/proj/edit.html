<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<th:block th:include="include :: header('修改项目')" />
</head>
<body class="white-bg">
	<div class="wrapper wrapper-content animated fadeInRight ibox-content">
		<form class="form-horizontal m" id="form-project-edit" th:object="${project}">
			<input name="projectId" th:field="*{projectId}" type="hidden">
			<div class="form-group">
				<label class="col-sm-3 control-label is-required">项目名称：</label>
				<div class="col-sm-8">
					<input name="projectName" th:field="*{projectName}" class="form-control" type="text" required>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label is-required">项目状态：</label>
				<div class="col-sm-8">
					<select name="projectStatus" class="form-control m-b" th:with="type=${@dict.getType('proj_project_status')}">
						<option th:each="dict : ${type}" th:text="${dict.dictLabel}" th:value="${dict.dictValue}" th:field="*{projectStatus}"></option>
					</select>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label is-required">负责人：</label>
				<div class="col-sm-8">
					<input name="manager" th:field="*{manager}" class="form-control" type="text" required>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label is-required">优先级：</label>
				<div class="col-sm-8">
					<select name="priority" class="form-control m-b" th:with="type=${@dict.getType('proj_priority')}">
						<option th:each="dict : ${type}" th:text="${dict.dictLabel}" th:value="${dict.dictValue}" th:field="*{priority}"></option>
					</select>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label">开始日期：</label>
				<div class="col-sm-8">
					<input name="startDate" th:value="${#dates.format(project.startDate, 'yyyy-MM-dd')}" class="form-control" type="text" placeholder="yyyy-MM-dd" onclick="layui.use('laydate', function(){layui.laydate.render({elem: this, type: 'date'})})">
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label">结束日期：</label>
				<div class="col-sm-8">
					<input name="endDate" th:value="${#dates.format(project.endDate, 'yyyy-MM-dd')}" class="form-control" type="text" placeholder="yyyy-MM-dd" onclick="layui.use('laydate', function(){layui.laydate.render({elem: this, type: 'date'})})">
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label">项目描述：</label>
				<div class="col-sm-8">
					<textarea name="description" class="form-control" rows="3" th:text="*{description}"></textarea>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label">备注：</label>
				<div class="col-sm-8">
					<textarea name="remark" class="form-control" rows="2" th:text="*{remark}"></textarea>
				</div>
			</div>
		</form>
	</div>
	<th:block th:include="include :: footer" />
	<script th:inline="javascript">
		var prefix = ctx + "project/proj";
		$("#form-project-edit").validate({
			focusCleanup: true
		});

		function submitHandler() {
			if ($.validate.form()) {
				$.operate.save(prefix + "/edit", $('#form-project-edit').serialize());
			}
		}
	</script>
</body>
</html>
