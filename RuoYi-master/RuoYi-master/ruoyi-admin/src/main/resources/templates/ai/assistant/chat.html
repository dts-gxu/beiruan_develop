<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<th:block th:include="include :: header('AI开发助手')" />
	<style>
		.ai-container { display: flex; height: calc(100vh - 30px); }
		/* 左侧步骤导航 */
		.ai-steps { width: 220px; background: #2f4050; color: #a7b1c2; padding: 15px 0; overflow-y: auto; flex-shrink: 0; }
		.ai-steps .step-item { padding: 12px 20px; cursor: pointer; border-left: 3px solid transparent; transition: all 0.2s; font-size: 13px; }
		.ai-steps .step-item:hover { background: #293846; color: #fff; }
		.ai-steps .step-item.active { background: #293846; color: #fff; border-left-color: #1ab394; }
		.ai-steps .step-item .step-num { display: inline-block; width: 22px; height: 22px; line-height: 22px; text-align: center; border-radius: 50%; background: #3e5771; color: #fff; font-size: 11px; margin-right: 8px; }
		.ai-steps .step-item.active .step-num { background: #1ab394; }
		.ai-steps .step-item.done .step-num { background: #1ab394; }
		.ai-steps .step-item.done .step-num::after { content: '\f00c'; font-family: FontAwesome; }
		.ai-steps .step-title { font-size: 15px; font-weight: 600; color: #fff; padding: 15px 20px 10px; }
		/* 右侧主区域 */
		.ai-main { flex: 1; display: flex; flex-direction: column; background: #f3f3f4; }
		.ai-header { background: #fff; padding: 12px 20px; border-bottom: 1px solid #e7eaec; display: flex; align-items: center; justify-content: space-between; }
		.ai-header h4 { margin: 0; font-size: 16px; color: #2f4050; }
		.ai-header .model-info { font-size: 12px; color: #999; }
		/* 聊天区域 */
		.chat-area { flex: 1; overflow-y: auto; padding: 20px; }
		.chat-message { margin-bottom: 16px; display: flex; }
		.chat-message.user { justify-content: flex-end; }
		.chat-message .avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
		.chat-message.ai .avatar { background: #1ab394; color: #fff; margin-right: 10px; }
		.chat-message.user .avatar { background: #3498db; color: #fff; margin-left: 10px; order: 2; }
		.chat-message .bubble { max-width: 75%; padding: 12px 16px; border-radius: 8px; font-size: 13px; line-height: 1.6; word-wrap: break-word; white-space: pre-wrap; }
		.chat-message.ai .bubble { background: #fff; border: 1px solid #e7eaec; color: #333; }
		.chat-message.user .bubble { background: #3498db; color: #fff; }
		.chat-message .bubble table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 12px; }
		.chat-message .bubble table th, .chat-message .bubble table td { border: 1px solid #ddd; padding: 6px 8px; text-align: left; }
		.chat-message .bubble table th { background: #f5f5f5; }
		.chat-message .bubble code { background: #f0f0f0; padding: 2px 4px; border-radius: 3px; font-size: 12px; }
		.chat-message .bubble pre { background: #2d2d2d; color: #f8f8f2; padding: 12px; border-radius: 4px; overflow-x: auto; }
		.chat-message .bubble pre code { background: none; color: inherit; }
		/* 输入区域 */
		.chat-input-area { background: #fff; border-top: 1px solid #e7eaec; padding: 15px 20px; }
		.chat-input-wrapper { display: flex; gap: 10px; }
		.chat-input-wrapper textarea { flex: 1; border: 1px solid #e5e6e7; border-radius: 4px; padding: 10px; font-size: 13px; resize: none; height: 60px; outline: none; }
		.chat-input-wrapper textarea:focus { border-color: #1ab394; }
		.chat-input-wrapper .btn-send { width: 80px; background: #1ab394; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
		.chat-input-wrapper .btn-send:hover { background: #18a689; }
		.chat-input-wrapper .btn-send:disabled { background: #ccc; cursor: not-allowed; }
		/* 快捷操作按钮 */
		.quick-actions { padding: 10px 0 5px; display: flex; gap: 8px; flex-wrap: wrap; }
		.quick-actions .btn-quick { padding: 4px 12px; font-size: 12px; border: 1px solid #1ab394; color: #1ab394; background: #fff; border-radius: 20px; cursor: pointer; }
		.quick-actions .btn-quick:hover { background: #1ab394; color: #fff; }
		/* 加载动画 */
		.typing-indicator { display: inline-flex; gap: 4px; padding: 8px 12px; }
		.typing-indicator span { width: 8px; height: 8px; border-radius: 50%; background: #1ab394; animation: typing 1.4s infinite ease-in-out; }
		.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
		.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
		@keyframes typing { 0%,80%,100%{transform:scale(0)} 40%{transform:scale(1)} }
		/* 结果面板 */
		.result-panel { background: #fff; border: 1px solid #e7eaec; border-radius: 4px; margin: 10px 0; }
		.result-panel .panel-header { padding: 10px 15px; background: #f5f5f5; border-bottom: 1px solid #e7eaec; font-weight: 600; font-size: 13px; display: flex; justify-content: space-between; }
		.result-panel .panel-body { padding: 15px; max-height: 400px; overflow-y: auto; }
		/* 文件上传 */
		.upload-area { padding: 8px 0 5px; display: flex; align-items: center; gap: 10px; }
		.upload-area .btn-upload { padding: 5px 14px; font-size: 12px; border: 1px dashed #1ab394; color: #1ab394; background: #f8fff8; border-radius: 4px; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; }
		.upload-area .btn-upload:hover { background: #e8f8f0; border-style: solid; }
		.upload-area .file-info { font-size: 12px; color: #666; max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
		.upload-area .file-info .remove-file { color: #e74c3c; cursor: pointer; margin-left: 6px; }
		/* Dify应用选择器 */
		.dify-app-bar { background: #fff; padding: 8px 20px; border-bottom: 1px solid #e7eaec; display: flex; align-items: center; gap: 12px; font-size: 13px; }
		.dify-app-bar select { border: 1px solid #e5e6e7; border-radius: 4px; padding: 4px 8px; font-size: 12px; max-width: 200px; }
		.dify-app-bar .btn-new-conv { padding: 4px 12px; font-size: 12px; background: #1ab394; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
		.dify-app-bar .btn-new-conv:hover { background: #18a689; }
		/* 会话历史列表 */
		.conv-history { max-height: 200px; overflow-y: auto; background: #f8f9fa; border-bottom: 1px solid #e7eaec; }
		.conv-history .conv-item { padding: 8px 20px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 12px; display: flex; justify-content: space-between; align-items: center; }
		.conv-history .conv-item:hover { background: #e8f8f0; }
		.conv-history .conv-item.active { background: #d4edda; border-left: 3px solid #1ab394; }
		.conv-history .conv-item .conv-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
		.conv-history .conv-item .conv-meta { font-size: 11px; color: #999; margin-left: 8px; white-space: nowrap; }
		.conv-history .conv-item .conv-actions { margin-left: 6px; }
		.conv-history .conv-item .conv-actions a { color: #999; margin-left: 4px; font-size: 11px; }
		.conv-history .conv-item .conv-actions a:hover { color: #e74c3c; }
		.conv-history-empty { padding: 15px 20px; text-align: center; color: #999; font-size: 12px; }
	</style>
</head>
<body class="gray-bg">
	<div class="ai-container">
		<!-- 左侧步骤导航 -->
		<div class="ai-steps">
			<div class="step-title"><i class="fa fa-magic"></i> 需求分析流程</div>
			<div class="step-item active" data-step="1.1" onclick="switchStep(this)">
				<span class="step-num">1</span>上传需求文档
			</div>
			<div class="step-item" data-step="1.3" onclick="switchStep(this)">
				<span class="step-num">2</span>AI提取关键信息
			</div>
			<div class="step-item" data-step="1.4" onclick="switchStep(this)">
				<span class="step-num">3</span>RuoYi适配分析
			</div>
			<div class="step-item" data-step="1.5" onclick="switchStep(this)">
				<span class="step-num">4</span>完整性评估
			</div>
			<div class="step-item" data-step="1.6" onclick="switchStep(this)">
				<span class="step-num">5</span>生成完整性报告
			</div>
			<div class="step-item" data-step="1.7" onclick="switchStep(this)">
				<span class="step-num">6</span>生成结构化JSON
			</div>
			<div class="step-title" style="margin-top:15px; border-top:1px solid #3e5771; padding-top:15px;">
				<i class="fa fa-code"></i> 代码生成流程
			</div>
			<div class="step-item" data-step="4.0" onclick="switchStep(this)">
				<span class="step-num">7</span>AI代码生成
			</div>
			<div class="step-item" data-step="5.0" onclick="switchStep(this)">
				<span class="step-num">8</span>测试用例生成
			</div>
			<div class="step-item" data-step="6.0" onclick="switchStep(this)">
				<span class="step-num">9</span>代码评审检查
			</div>
			<div class="step-title" style="margin-top:15px; border-top:1px solid #3e5771; padding-top:15px;">
				<i class="fa fa-comments"></i> 自由对话
			</div>
			<div class="step-item" data-step="chat" onclick="switchStep(this)">
				<span class="step-num"><i class="fa fa-comment" style="font-size:10px"></i></span>AI自由聊天
			</div>
		</div>

		<!-- 右侧主区域 -->
		<div class="ai-main">
			<div class="ai-header">
				<h4 id="currentStepTitle"><i class="fa fa-magic"></i> 步骤1.1 — 上传需求文档</h4>
				<span class="model-info" id="modelInfo">模型加载中...</span>
			</div>

			<!-- Dify应用选择 + 会话管理（仅在自由对话模式显示） -->
			<div id="difyPanel" style="display:none;">
				<div class="dify-app-bar">
					<label><i class="fa fa-rocket"></i> Dify应用：</label>
					<select id="difyAppSelect" onchange="onDifyAppChange()">
						<option value="">加载中...</option>
					</select>
					<button class="btn-new-conv" onclick="createNewConversation()"><i class="fa fa-plus"></i> 新对话</button>
					<button class="btn-new-conv" style="background:#3498db;" onclick="toggleConvHistory()"><i class="fa fa-history"></i> 历史</button>
					<span id="difyModeInfo" style="margin-left:auto; font-size:11px; color:#999;"></span>
				</div>
				<div class="conv-history" id="convHistory" style="display:none;">
					<div class="conv-history-empty" id="convEmpty">暂无历史会话</div>
				</div>
			</div>

			<!-- 聊天消息区域 -->
			<div class="chat-area" id="chatArea">
				<div class="chat-message ai">
					<div class="avatar"><i class="fa fa-robot"></i></div>
					<div class="bubble">
						<b>欢迎使用AI开发助手！</b><br/><br/>
						我是你的AI架构师，精通RuoYi v4.8.2框架。<br/><br/>
						<b>开始第一步：</b>请在下方输入框中粘贴你的业务需求文档内容，或者直接描述你要开发的功能。<br/><br/>
						<b>例如：</b>我要开发一个项目任务管理模块，包括项目管理和任务管理两个功能...
					</div>
				</div>
			</div>

			<!-- 快捷操作 + 输入区域 -->
			<div class="chat-input-area">
				<div class="quick-actions" id="quickActions">
					<button class="btn-quick" onclick="quickAction('analyze')"><i class="fa fa-search"></i> 提取关键信息</button>
					<button class="btn-quick" onclick="quickAction('adapt')"><i class="fa fa-cogs"></i> RuoYi适配分析</button>
					<button class="btn-quick" onclick="quickAction('evaluate')"><i class="fa fa-check-circle"></i> 完整性评估</button>
					<button class="btn-quick" onclick="quickAction('report')"><i class="fa fa-file-text"></i> 生成报告</button>
					<button class="btn-quick" onclick="quickAction('json')"><i class="fa fa-code"></i> 生成JSON</button>
					<button class="btn-quick" onclick="quickAction('genCode')"><i class="fa fa-file-code-o"></i> 生成代码</button>
					<button class="btn-quick" onclick="quickAction('genTest')"><i class="fa fa-flask"></i> 生成测试</button>
					<button class="btn-quick" onclick="quickAction('review')"><i class="fa fa-eye"></i> 代码评审</button>
					<button class="btn-quick" onclick="quickAction('all')"><i class="fa fa-forward"></i> 一键全流程</button>
				</div>
				<div class="upload-area">
					<label class="btn-upload" for="fileUpload"><i class="fa fa-paperclip"></i> 上传需求文件</label>
					<input type="file" id="fileUpload" style="display:none" accept=".pdf,.doc,.docx,.xls,.xlsx,.txt,.md,.png,.jpg,.jpeg,.gif,.bmp,.webp" onchange="handleFileUpload(this)" />
					<span class="file-info" id="fileInfo">(支持 PDF/Word/Excel/图片/TXT，最大20MB)</span>
				</div>
				<div class="chat-input-wrapper">
					<textarea id="userInput" placeholder="输入需求文档内容或问题...（Shift+Enter换行，Enter发送）" onkeydown="handleKeyDown(event)"></textarea>
					<button class="btn-send" id="btnSend" onclick="sendMessage()"><i class="fa fa-paper-plane"></i> 发送</button>
				</div>
			</div>
		</div>
	</div>

	<th:block th:include="include :: footer" />
	<script>
		var prefix = ctx + "ai/assistant";
		var currentStep = "1.1";
		var analysisHistory = {};
		var isProcessing = false;
		// Dify会话管理状态
		var difyApps = [];
		var currentAppId = null;
		var currentConversationId = null;
		var isDifyMode = false;

		/* 初始化 */
		$(function() {
			$('#modelInfo').text('DeepSeek V3 | 就绪');
			$('#userInput').focus();
		});

		/* 切换步骤 */
		function switchStep(el) {
			$('.step-item').removeClass('active');
			$(el).addClass('active');
			currentStep = $(el).data('step');
			var titles = {
				'1.1': '步骤1.1 — 上传需求文档',
				'1.3': '步骤1.3 — AI提取关键信息',
				'1.4': '步骤1.4 — RuoYi适配分析',
				'1.5': '步骤1.5 — 完整性评估',
				'1.6': '步骤1.6 — 生成完整性报告',
				'1.7': '步骤1.7 — 生成结构化JSON',
				'4.0': '第四步 — AI代码生成',
				'5.0': '第五步 — 测试用例生成',
				'6.0': '第六步 — 代码评审检查',
				'chat': '自由对话（Dify）'
			};
			$('#currentStepTitle').html('<i class="fa fa-magic"></i> ' + (titles[currentStep] || ''));

			// 显示/隐藏Dify面板
			if (currentStep === 'chat') {
				isDifyMode = true;
				$('#difyPanel').show();
				$('#quickActions').hide();
				$('.upload-area').hide();
				loadDifyApps();
			} else {
				isDifyMode = false;
				$('#difyPanel').hide();
				$('#quickActions').show();
				$('.upload-area').show();
			}
		}

		/* 发送消息 */
		function sendMessage() {
			var msg = $('#userInput').val().trim();
			if (!msg || isProcessing) return;
			appendMessage('user', msg);
			$('#userInput').val('');

			// Dify模式：通过Dify API发送
			if (isDifyMode && currentConversationId) {
				callDifyChat(msg);
				return;
			}
			
			// 任何时候发送的文本都保存为需求文档（如果还没有的话）
			if (!analysisHistory['1.1'] && msg.length > 50) {
				analysisHistory['1.1'] = msg;
				markStepDone('1.1');
			}
			
			callAiChat(msg);
		}

		/* 键盘事件 */
		function handleKeyDown(e) {
			if (e.key === 'Enter' && !e.shiftKey) {
				e.preventDefault();
				sendMessage();
			}
		}

		/* 添加消息到聊天区 */
		function appendMessage(role, content) {
			var icon = role === 'ai' ? '<i class="fa fa-robot"></i>' : '<i class="fa fa-user"></i>';
			var html = '<div class="chat-message ' + role + '">'
				+ '<div class="avatar">' + icon + '</div>'
				+ '<div class="bubble">' + formatMarkdown(content) + '</div>'
				+ '</div>';
			$('#chatArea').append(html);
			scrollToBottom();
		}

		/* 添加加载动画 */
		function showTyping() {
			var html = '<div class="chat-message ai" id="typingIndicator">'
				+ '<div class="avatar"><i class="fa fa-robot"></i></div>'
				+ '<div class="bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>'
				+ '</div>';
			$('#chatArea').append(html);
			scrollToBottom();
		}

		function hideTyping() {
			$('#typingIndicator').remove();
		}

		/* 调用AI聊天接口 */
		function callAiChat(message) {
			isProcessing = true;
			$('#btnSend').prop('disabled', true);
			$('#modelInfo').text('DeepSeek V3 | 思考中...');
			showTyping();

			$.ajax({
				url: prefix + '/chat',
				type: 'POST',
				data: { message: message },
				timeout: 180000,
				success: function(res) {
					hideTyping();
					if (res.code == 0) {
						var reply = res.data || res.msg;
						appendMessage('ai', reply);
						analysisHistory[currentStep] = reply;
					} else {
						appendMessage('ai', '❌ 错误：' + res.msg);
					}
				},
				error: function(xhr, status, error) {
					hideTyping();
					if (status === 'timeout') {
						appendMessage('ai', '❌ 请求超时，请稍后重试。建议缩短输入内容长度。');
					} else {
						appendMessage('ai', '❌ 网络错误：' + error);
					}
				},
				complete: function() {
					isProcessing = false;
					$('#btnSend').prop('disabled', false);
					$('#modelInfo').text('DeepSeek V3 | 就绪');
				}
			});
		}

		/* 调用流程API */
		function callStepApi(url, data, stepKey) {
			isProcessing = true;
			$('#btnSend').prop('disabled', true);
			$('#modelInfo').text('DeepSeek V3 | 分析中...');
			showTyping();

			$.ajax({
				url: prefix + url,
				type: 'POST',
				data: data,
				timeout: 180000,
				success: function(res) {
					hideTyping();
					if (res.code == 0) {
						var reply = res.data || res.msg;
						appendMessage('ai', reply);
						analysisHistory[stepKey] = reply;
						markStepDone(stepKey);
					} else {
						appendMessage('ai', '❌ 错误：' + res.msg);
					}
				},
				error: function(xhr, status, error) {
					hideTyping();
					appendMessage('ai', '❌ 请求失败：' + (status === 'timeout' ? '请求超时' : error));
				},
				complete: function() {
					isProcessing = false;
					$('#btnSend').prop('disabled', false);
					$('#modelInfo').text('DeepSeek V3 | 就绪');
				}
			});
		}

		/* 获取需求文档内容（优先历史 > 输入框） */
		function getDocContent() {
			var doc = analysisHistory['1.1'];
			if (doc) return doc;
			var input = $('#userInput').val().trim();
			if (input) {
				analysisHistory['1.1'] = input;
				$('#userInput').val('');
				markStepDone('1.1');
				return input;
			}
			return null;
		}

		/* 快捷操作 */
		function quickAction(action) {
			if (isProcessing) return;

			if (action === 'analyze') {
				var doc = getDocContent();
				if (!doc) { layer.msg('请先上传文件或在输入框输入需求文档', {icon: 5}); return; }
				appendMessage('user', '[步骤1.3] 请提取需求文档的关键信息');
				callStepApi('/analyze', { document: doc }, '1.3');
			}
			else if (action === 'adapt') {
				var prev = analysisHistory['1.3'];
				if (!prev) { layer.msg('请先执行"提取关键信息"步骤', {icon: 5}); return; }
				appendMessage('user', '[步骤1.4] 请进行RuoYi适配分析');
				callStepApi('/adapt', { analysisResult: prev }, '1.4');
			}
			else if (action === 'evaluate') {
				var prev = (analysisHistory['1.3'] || '') + '\n\n' + (analysisHistory['1.4'] || '');
				if (!analysisHistory['1.3']) { layer.msg('请先执行"提取关键信息"步骤', {icon: 5}); return; }
				appendMessage('user', '[步骤1.5] 请进行完整性评估');
				callStepApi('/evaluate', { analysisResult: prev }, '1.5');
			}
			else if (action === 'report') {
				var all = (analysisHistory['1.3'] || '') + '\n\n' + (analysisHistory['1.4'] || '') + '\n\n' + (analysisHistory['1.5'] || '');
				if (!analysisHistory['1.5']) { layer.msg('请先执行"完整性评估"步骤', {icon: 5}); return; }
				appendMessage('user', '[步骤1.6] 请生成需求完整性报告');
				callReportApi(all);
			}
			else if (action === 'json') {
				var all = Object.values(analysisHistory).join('\n\n---\n\n');
				if (!analysisHistory['1.3']) { layer.msg('请先执行需求分析流程', {icon: 5}); return; }

		/* 简单Markdown格式化 */
		function formatMarkdown(text) {
			if (!text) return '';
			// 转义HTML
			text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
			// 代码块
			text = text.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
			// 行内代码
			text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
			// 粗体
			text = text.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
			// 斜体
			text = text.replace(/\*(.+?)\*/g, '<i>$1</i>');
			// 标题
			text = text.replace(/^### (.+)$/gm, '<h5 style="margin:8px 0 4px;font-size:14px;">$1</h5>');
			text = text.replace(/^## (.+)$/gm, '<h4 style="margin:10px 0 6px;font-size:15px;">$1</h4>');
			text = text.replace(/^# (.+)$/gm, '<h3 style="margin:12px 0 8px;">$1</h3>');
			// 表格
			text = formatTables(text);
			// 列表
			text = text.replace(/^- (.+)$/gm, '• $1');
			return text;
		}

		/* 简单表格格式化 */
		function formatTables(text) {
			var lines = text.split('\n');
			var result = [];
			var inTable = false;
			var tableHtml = '';

			for (var i = 0; i < lines.length; i++) {
				var line = lines[i].trim();
				if (line.match(/^\|.*\|$/)) {
					if (!inTable) {
						inTable = true;
						tableHtml = '<table>';
					}
					if (line.match(/^\|[\s\-:|]+\|$/)) continue;
					var cells = line.split('|').filter(function(c) { return c.trim() !== ''; });
					var tag = (tableHtml === '<table>') ? 'th' : 'td';
					tableHtml += '<tr>';
					for (var j = 0; j < cells.length; j++) {
						tableHtml += '<' + tag + '>' + cells[j].trim() + '</' + tag + '>';
					}
					tableHtml += '</tr>';
				} else {
					if (inTable) {
						tableHtml += '</table>';
						result.push(tableHtml);
						inTable = false;
						tableHtml = '';
					}
					result.push(line);
				}
			}
			if (inTable) {
				tableHtml += '</table>';
				result.push(tableHtml);
			}
			return result.join('\n');
		}

		/* 文件上传处理 */
		function handleFileUpload(input) {
			var file = input.files[0];
			if (!file) return;

			var maxSize = 20 * 1024 * 1024;
			if (file.size > maxSize) {
				layer.msg('文件大小不能超过20MB', {icon: 5});
				input.value = '';
				return;
			}

			var ext = file.name.split('.').pop().toLowerCase();
			var allowed = ['pdf','doc','docx','xls','xlsx','txt','md','png','jpg','jpeg','gif','bmp','webp'];
			if (allowed.indexOf(ext) === -1) {
				layer.msg('不支持的文件格式：' + ext, {icon: 5});
				input.value = '';
				return;
			}

			$('#fileInfo').html('<i class="fa fa-spinner fa-spin"></i> 正在解析 ' + file.name + ' ...');
			$('#btnSend').prop('disabled', true);
			appendMessage('user', '<i class="fa fa-file"></i> 上传文件：' + file.name + ' (' + formatFileSize(file.size) + ')');

			var formData = new FormData();
			formData.append('file', file);

			$.ajax({
				url: prefix + '/upload',
				type: 'POST',
				data: formData,
				processData: false,
				contentType: false,
				timeout: 120000,
				success: function(res) {
					if (res.code == 0) {
						var text = res.data;
						analysisHistory['1.1'] = text;
						markStepDone('1.1');
						var preview = text.length > 500 ? text.substring(0, 500) + '\n...(共' + text.length + '字符)' : text;
						appendMessage('ai', '<b>文件解析成功！</b> 提取文本 ' + text.length + ' 字符\n\n<b>文档预览：</b>\n' + preview + '\n\n<b>接下来请选择：</b>\n1. 点击 <b>"提取关键信息"</b> 开始分步分析\n2. 点击 <b>"一键执行全流程"</b> 自动完成所有步骤');
						$('#fileInfo').html('<i class="fa fa-check-circle" style="color:#1ab394"></i> ' + file.name + ' <span class="remove-file" onclick="clearFile()"><i class="fa fa-times"></i></span>');
					} else {
						appendMessage('ai', '<b>文件解析失败：</b>' + res.msg);
						$('#fileInfo').html('(支持 PDF/Word/Excel/图片/TXT，最大20MB)');
					}
				},
				error: function(xhr, status, error) {
					appendMessage('ai', '<b>文件上传失败：</b>' + (status === 'timeout' ? '请求超时' : error));
					$('#fileInfo').html('(支持 PDF/Word/Excel/图片/TXT，最大20MB)');

					$('#btnSend').prop('disabled', false);
					input.value = '';
				}
			});
		}

		/* 格式化文件大小 */
		function formatFileSize(bytes) {
			if (bytes < 1024) return bytes + 'B';
			if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + 'KB';
			return (bytes / (1024 * 1024)).toFixed(1) + 'MB';
		}

		/* ====================== Dify会话管理 ====================== */

		/* 加载Dify应用列表 */
		function loadDifyApps() {
			if (difyApps.length > 0) return;
			$.ajax({
				url: prefix + '/dify/apps',
				type: 'POST',
				success: function(res) {
					if (res.code == 0) {
						difyApps = res.data || [];
						var select = $('#difyAppSelect');
						select.empty();
						if (difyApps.length === 0) {
							select.append('<option value="">暂无可用应用（请先配置）</option>');
							$('#difyModeInfo').text('未配置Dify应用，将使用LangChain4j');
						} else {
							select.append('<option value="">请选择应用...</option>');
							for (var i = 0; i < difyApps.length; i++) {
								var app = difyApps[i];
								var typeName = {0:'Chat',1:'Workflow',2:'Completion',3:'Agent'}[app.appType] || '';
								select.append('<option value="' + app.appId + '">[' + typeName + '] ' + app.appName + '</option>');
							}
							$('#difyModeInfo').text('共 ' + difyApps.length + ' 个可用应用');
						}
					}
				}
			});
		}

		/* Dify应用切换 */
		function onDifyAppChange() {
			var appId = $('#difyAppSelect').val();
			if (!appId) {
				currentAppId = null;
				currentConversationId = null;
				$('#convHistory').hide();
				return;
			}
			currentAppId = parseInt(appId);
			currentConversationId = null;
			loadConversationHistory();
		}

		/* 加载会话历史 */
		function loadConversationHistory() {
			if (!currentAppId) return;
			$.ajax({
				url: prefix + '/conversation/list',
				type: 'POST',
				data: { appId: currentAppId },
				success: function(res) {
					if (res.code == 0) {
						var list = res.data || [];
						renderConversationList(list);
					}
				}
			});
		}

		/* 渲染会话列表 */
		function renderConversationList(list) {
			var container = $('#convHistory');
			container.empty();
			if (list.length === 0) {
				container.html('<div class="conv-history-empty">暂无历史会话，请点击"新对话"开始</div>');
			} else {
				for (var i = 0; i < list.length; i++) {
					var conv = list[i];
					var active = (currentConversationId == conv.conversationId) ? ' active' : '';
					var time = conv.lastMessageTime || conv.createTime || '';
					if (time && time.length > 16) time = time.substring(5, 16);
					var html = '<div class="conv-item' + active + '" data-id="' + conv.conversationId + '" onclick="switchConversation(' + conv.conversationId + ')">'
						+ '<span class="conv-title" title="' + conv.title + '">' + conv.title + '</span>'
						+ '<span class="conv-meta">' + (conv.messageCount || 0) + '条 ' + time + '</span>'
						+ '<span class="conv-actions">'
						+ '<a href="javascript:void(0)" onclick="event.stopPropagation();renameConversation(' + conv.conversationId + ')" title="重命名"><i class="fa fa-pencil"></i></a>'
						+ '<a href="javascript:void(0)" onclick="event.stopPropagation();deleteConversation(' + conv.conversationId + ')" title="删除"><i class="fa fa-trash"></i></a>'
						+ '</span></div>';
					container.append(html);
				}
			}
			container.show();
		}

		/* 切换到某个会话 */
		function switchConversation(convId) {
			currentConversationId = convId;
			$('.conv-item').removeClass('active');
			$('.conv-item[data-id="' + convId + '"]').addClass('active');
			// 清空聊天区并加载历史消息
			$('#chatArea').empty();
			loadConversationMessages(convId);
		}

		/* 加载会话消息 */
		function loadConversationMessages(convId) {
			showTyping();
			$.ajax({
				url: prefix + '/conversation/messages',
				type: 'POST',
				data: { conversationId: convId },
				success: function(res) {
					hideTyping();
					if (res.code == 0) {
						var messages = res.data || [];
						if (messages.length === 0) {
							appendMessage('ai', '会话已就绪，请输入你的问题。');
						} else {
							for (var i = 0; i < messages.length; i++) {
								var msg = messages[i];
								var role = msg.role === '0' ? 'user' : 'ai';
								appendMessage(role, msg.content);
							}
						}
						$('#difyModeInfo').text('会话 #' + convId + ' | 共 ' + messages.length + ' 条消息');
					}
				},
				error: function() {
					hideTyping();
					appendMessage('ai', '加载历史消息失败');
				}
			});
		}

		/* 创建新会话 */
		function createNewConversation() {
			if (!currentAppId) {
				layer.msg('请先选择一个Dify应用', {icon: 7});
				return;
			}
			layer.prompt({title: '输入会话标题', value: '新对话', formType: 0}, function(title, index) {
				layer.close(index);
				$.ajax({
					url: prefix + '/conversation/create',
					type: 'POST',
					data: { appId: currentAppId, title: title },
					success: function(res) {
						if (res.code == 0) {
							var conv = res.data;
							currentConversationId = conv.conversationId;
							$('#chatArea').empty();
							appendMessage('ai', '<b>新对话已创建：</b>' + conv.title + '\n\n请输入你的问题开始对话。');
							loadConversationHistory();
							layer.msg('会话创建成功', {icon: 1});
						} else {
							layer.msg(res.msg, {icon: 2});
						}
					}
				});
			});
		}

		/* 删除会话 */
		function deleteConversation(convId) {
			layer.confirm('确定删除该会话及其所有消息？', {icon: 3, title: '提示'}, function(index) {
				layer.close(index);
				$.ajax({
					url: prefix + '/conversation/delete',
					type: 'POST',
					data: { conversationId: convId },
					success: function(res) {
						if (res.code == 0) {
							if (currentConversationId == convId) {
								currentConversationId = null;
								$('#chatArea').empty();
								appendMessage('ai', '会话已删除。请选择或新建一个会话。');
							}
							loadConversationHistory();
							layer.msg('删除成功', {icon: 1});
						} else {
							layer.msg(res.msg, {icon: 2});
						}
					}
				});
			});
		}

		/* 重命名会话 */
		function renameConversation(convId) {
			layer.prompt({title: '修改会话标题', formType: 0}, function(title, index) {
				layer.close(index);
				$.ajax({
					url: prefix + '/conversation/rename',
					type: 'POST',
					data: { conversationId: convId, title: title },
					success: function(res) {
						if (res.code == 0) {
							loadConversationHistory();
							layer.msg('修改成功', {icon: 1});
						} else {
							layer.msg(res.msg, {icon: 2});
						}
					}
				});
			});
		}

		/* 切换会话历史面板显示/隐藏 */
		function toggleConvHistory() {
			$('#convHistory').toggle();
		}

		/* 通过Dify发送消息（带持久化） */
		function callDifyChat(message) {
			if (!currentConversationId) {
				appendMessage('ai', '请先选择或新建一个会话。');
				return;
			}
			isProcessing = true;
			$('#btnSend').prop('disabled', true);
			$('#modelInfo').text('Dify | 思考中...');
			showTyping();

			$.ajax({
				url: prefix + '/dify/chat',
				type: 'POST',
				data: { conversationId: currentConversationId, content: message },
				timeout: 300000,
				success: function(res) {
					hideTyping();
					if (res.code == 0) {
						var data = res.data;
						appendMessage('ai', data.answer);
						var info = [];
						if (data.model) info.push(data.model);
						if (data.tokens) info.push(data.tokens + ' tokens');
						if (data.costTime) info.push((data.costTime / 1000).toFixed(1) + 's');
						$('#difyModeInfo').text(info.join(' | '));
					} else {
						appendMessage('ai', '对话失败：' + res.msg);
					}
				},
				error: function(xhr, status, error) {
					hideTyping();
					if (status === 'timeout') {
						appendMessage('ai', '请求超时，请稍后重试。');
					} else {
						appendMessage('ai', '网络错误：' + error);
					}
				},
				complete: function() {
					isProcessing = false;
					$('#btnSend').prop('disabled', false);
					$('#modelInfo').text('Dify | 就绪');
					// 更新会话列表中的消息数
					loadConversationHistory();
				}
			});
		}
	</script>
</body>
</html>
