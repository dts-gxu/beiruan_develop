<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<th:block th:include="include :: header('AI开发助手')" />
	<style>
		/* ===== 整体布局：左侧会话列表 + 右侧聊天区域（类似千问/FastGPT） ===== */
		.ai-container { display: flex; height: calc(100vh - 30px); }
		/* 左侧会话边栏 */
		.ai-sidebar { width: 260px; background: #1e1e2e; color: #cdd6f4; display: flex; flex-direction: column; flex-shrink: 0; }
		.sidebar-header { padding: 16px; border-bottom: 1px solid #313244; }
		.sidebar-header .btn-new-chat { width: 100%; padding: 10px 0; background: #1ab394; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 6px; transition: background 0.2s; }
		.sidebar-header .btn-new-chat:hover { background: #18a689; }
		.sidebar-search { padding: 8px 16px; }
		.sidebar-search input { width: 100%; padding: 8px 10px; background: #313244; border: 1px solid #45475a; border-radius: 6px; color: #cdd6f4; font-size: 12px; outline: none; }
		.sidebar-search input::placeholder { color: #6c7086; }
		.sidebar-search input:focus { border-color: #1ab394; }
		/* 会话列表 */
		.conv-list { flex: 1; overflow-y: auto; padding: 8px; }
		.conv-list::-webkit-scrollbar { width: 4px; }
		.conv-list::-webkit-scrollbar-thumb { background: #45475a; border-radius: 2px; }
		.conv-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; margin-bottom: 2px; display: flex; align-items: center; transition: background 0.15s; position: relative; }
		.conv-item:hover { background: #313244; }
		.conv-item:hover .conv-actions { display: flex; }
		.conv-item.active { background: #313244; }
		.conv-item .conv-icon { width: 28px; height: 28px; border-radius: 6px; background: #45475a; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; margin-right: 10px; color: #a6adc8; }
		.conv-item.active .conv-icon { background: #1ab394; color: #fff; }
		.conv-item .conv-info { flex: 1; overflow: hidden; }
		.conv-item .conv-title { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #cdd6f4; }
		.conv-item .conv-meta { font-size: 11px; color: #6c7086; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
		.conv-item .conv-actions { display: none; position: absolute; right: 8px; top: 50%; transform: translateY(-50%); gap: 4px; background: #313244; padding: 2px 4px; border-radius: 4px; }
		.conv-item .conv-actions a { color: #a6adc8; font-size: 12px; padding: 2px 4px; cursor: pointer; }
		.conv-item .conv-actions a:hover { color: #f38ba8; }
		.conv-item .conv-actions a.edit:hover { color: #a6e3a1; }
		.conv-item .conv-actions a.pin:hover { color: #f9e2af; }
		.conv-item.pinned { border-left: 3px solid #f9e2af; }
		.conv-item.pinned .conv-icon { background: #f9e2af; color: #1e1e2e; }
		.conv-empty { text-align: center; color: #6c7086; padding: 40px 20px; font-size: 13px; }
		.sidebar-footer { padding: 10px 16px; border-top: 1px solid #313244; }
		.sidebar-footer .btn-clear-all { width: 100%; padding: 8px 0; background: transparent; color: #6c7086; border: 1px solid #45475a; border-radius: 6px; cursor: pointer; font-size: 12px; transition: all 0.2s; }
		.sidebar-footer .btn-clear-all:hover { background: #f38ba8; color: #fff; border-color: #f38ba8; }
		/* 右侧主区域 */
		.ai-main { flex: 1; display: flex; flex-direction: column; background: #f5f5f5; }
		.ai-header { background: #fff; padding: 12px 20px; border-bottom: 1px solid #e7eaec; display: flex; align-items: center; justify-content: space-between; }
		.ai-header h4 { margin: 0; font-size: 16px; color: #2f4050; }
		.ai-header .model-info { font-size: 12px; color: #999; }
		/* 聊天区域 */
		.chat-area { flex: 1; overflow-y: auto; padding: 20px; }
		.chat-message { margin-bottom: 16px; display: flex; }
		.chat-message.user { justify-content: flex-end; }
		.chat-message .avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
		.chat-message.ai .avatar { background: #1ab394; color: #fff; margin-right: 10px; }
		.chat-message.user .avatar { background: #3498db; color: #fff; margin-left: 10px; order: 2; }
		.chat-message .bubble { max-width: 75%; padding: 12px 16px; border-radius: 12px; font-size: 13px; line-height: 1.7; word-wrap: break-word; white-space: pre-wrap; }
		.chat-message.ai .bubble { background: #fff; border: 1px solid #e7eaec; color: #333; border-radius: 12px 12px 12px 2px; }
		.chat-message.user .bubble { background: #1ab394; color: #fff; border-radius: 12px 12px 2px 12px; }
		.chat-message .bubble table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 12px; table-layout: fixed; }
		.chat-message .bubble table th, .chat-message .bubble table td { border: 1px solid #ddd; padding: 6px 8px; text-align: left; word-wrap: break-word; overflow-wrap: break-word; }
		.chat-message .bubble table th { background: #f5f5f5; }
		.chat-message .bubble .table-wrap { overflow-x: auto; margin: 8px 0; }
		.bubble.streaming { contain: layout style; }
		.chat-message .bubble code { background: #f0f0f0; padding: 2px 4px; border-radius: 3px; font-size: 12px; }
		.chat-message .bubble pre { background: #2d2d2d; color: #f8f8f2; padding: 12px; border-radius: 4px; overflow-x: auto; }
		.chat-message .bubble pre code { background: none; color: inherit; }
		/* 输入区域 */
		.chat-input-area { background: #fff; border-top: 1px solid #e7eaec; padding: 12px 20px; }
		.quick-actions { padding: 0 0 8px; display: flex; gap: 6px; flex-wrap: wrap; }
		.quick-actions .btn-quick { padding: 4px 12px; font-size: 12px; border: 1px solid #1ab394; color: #1ab394; background: #fff; border-radius: 20px; cursor: pointer; transition: all 0.15s; }
		.quick-actions .btn-quick:hover { background: #1ab394; color: #fff; }
		.upload-area { padding: 0 0 8px; display: flex; align-items: center; gap: 10px; }
		.upload-area .btn-upload { padding: 5px 14px; font-size: 12px; border: 1px dashed #1ab394; color: #1ab394; background: #f8fff8; border-radius: 4px; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; }
		.upload-area .btn-upload:hover { background: #e8f8f0; border-style: solid; }
		.upload-area .file-info { font-size: 12px; color: #666; max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
		.upload-area .file-info .remove-file { color: #e74c3c; cursor: pointer; margin-left: 6px; }
		.chat-input-wrapper { display: flex; gap: 10px; }
		.chat-input-wrapper textarea { flex: 1; border: 1px solid #e5e6e7; border-radius: 8px; padding: 10px 14px; font-size: 13px; resize: none; height: 56px; outline: none; transition: border 0.15s; }
		.chat-input-wrapper textarea:focus { border-color: #1ab394; box-shadow: 0 0 0 2px rgba(26,179,148,0.1); }
		.chat-input-wrapper .btn-send { width: 80px; min-width: 80px; flex-shrink: 0; background: #1ab394; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; transition: background 0.15s; }
		.chat-input-wrapper .btn-send:hover { background: #18a689; }
		.chat-input-wrapper .btn-send:disabled { background: #ccc; cursor: not-allowed; }
		/* 加载动画 */
		.typing-indicator { display: inline-flex; gap: 4px; padding: 8px 12px; }
		.typing-indicator span { width: 8px; height: 8px; border-radius: 50%; background: #1ab394; animation: typing 1.4s infinite ease-in-out; }
		.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
		.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
		@keyframes typing { 0%,80%,100%{transform:scale(0)} 40%{transform:scale(1)} }
		/* 欢迎页 */
		.welcome-page { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; color: #666; }
		.welcome-page .welcome-icon { font-size: 48px; color: #1ab394; margin-bottom: 16px; }
		.welcome-page h3 { color: #333; margin-bottom: 8px; }
		.welcome-page p { font-size: 14px; color: #888; max-width: 400px; text-align: center; line-height: 1.6; }
	</style>
</head>
<body class="gray-bg">
	<div class="ai-container">
		<!-- 左侧会话列表（类似千问/FastGPT） -->
		<div class="ai-sidebar">
			<div class="sidebar-header">
				<button class="btn-new-chat" onclick="createNewChat()">
					<i class="fa fa-plus"></i> 新建对话
				</button>
			</div>
			<div class="sidebar-search">
				<input type="text" id="convSearch" placeholder="搜索对话..." oninput="filterConversations()" />
			</div>
			<div class="conv-list" id="convList">
				<div class="conv-empty"><i class="fa fa-comments" style="font-size:24px;display:block;margin-bottom:10px;"></i>暂无对话记录<br/>点击上方按钮开始新对话</div>
			</div>
			<div class="sidebar-footer">
				<button class="btn-clear-all" onclick="clearAllConversations()"><i class="fa fa-trash"></i> 清空所有对话</button>
			</div>
		</div>

		<!-- 右侧主区域 -->
		<div class="ai-main">
			<div class="ai-header">
				<h4 id="currentTitle"><i class="fa fa-comments"></i> AI开发助手</h4>
				<span class="model-info" id="modelInfo">DeepSeek V3 | 就绪</span>
			</div>

			<!-- 聊天消息区域 -->
			<div class="chat-area" id="chatArea">
				<div class="welcome-page" id="welcomePage">
					<div class="welcome-icon"><i class="fa fa-robot"></i></div>
					<h3>欢迎使用 AI 开发助手</h3>
					<p>我是你的AI架构师，精通RuoYi v4.8.2框架。<br/>点击左侧 <b>「新建对话」</b> 开始新的会话，或选择已有对话继续。</p>
				</div>
			</div>

			<!-- 输入区域 -->
			<div class="chat-input-area" id="inputArea">
				<div class="quick-actions" id="quickActions">
					<button class="btn-quick" onclick="quickAction('analyze')"><i class="fa fa-search"></i> 提取关键信息</button>
					<button class="btn-quick" onclick="quickAction('adapt')"><i class="fa fa-cogs"></i> RuoYi适配分析</button>
					<button class="btn-quick" onclick="quickAction('evaluate')"><i class="fa fa-check-circle"></i> 完整性评估</button>
					<button class="btn-quick" onclick="quickAction('report')"><i class="fa fa-file-text"></i> 生成报告</button>
					<button class="btn-quick" onclick="quickAction('all')"><i class="fa fa-forward"></i> 一键全流程</button>
				</div>
				<div class="upload-area">
					<label class="btn-upload" for="fileUpload"><i class="fa fa-paperclip"></i> 上传文件</label>
					<input type="file" id="fileUpload" style="display:none" accept=".pdf,.doc,.docx,.xls,.xlsx,.txt,.md,.png,.jpg,.jpeg,.gif,.bmp,.webp" onchange="handleFileUpload(this)" />
					<span class="file-info" id="fileInfo">(支持 PDF/Word/Excel/图片/TXT，最大20MB)</span>
				</div>
				<div class="chat-input-wrapper">
					<textarea id="userInput" placeholder="输入消息...（Shift+Enter换行，Enter发送）" onkeydown="handleKeyDown(event)"></textarea>
					<button class="btn-send" id="btnSend" onclick="sendMessage()"><i class="fa fa-paper-plane"></i> 发送</button>
				</div>
			</div>
		</div>
	</div>

	<th:block th:include="include :: footer" />
	<script>
		var prefix = ctx + "ai/assistant";
		var conversations = [];       // 会话列表缓存
		var currentConversationId = null;  // 当前会话ID
		var isProcessing = false;
		var uploadedFileInfo = null;   // {fileName, storedName, fileSize, text}
		var analysisHistory = {};      // 流程步骤缓存
		var useStreamMode = true;      // 是否使用SSE流式模式（仿FastGPT streamFetch）
		var messageCache = {};         // 仿FastGPT chatRecords: 每个会话的消息DOM缓存

		/* 仿FastGPT: 保存当前聊天区域DOM到缓存 */
		function saveCurrentChatToCache() {
			if (currentConversationId && $('#chatArea .chat-message').length > 0) {
				messageCache[currentConversationId] = $('#chatArea').html();
			}
		}

		/* 仿FastGPT: 从缓存恢复聊天区域 */
		function restoreFromCache(conversationId) {
			if (messageCache[conversationId]) {
				$('#chatArea').html(messageCache[conversationId]);
				scrollToBottom();
				return true;
			}
			return false;
		}

		/* 仿FastGPT onUpdateHistoryTitle: 乐观更新侧栏中指定会话的标题和消息数 */
		function onUpdateHistoryTitle(conversationId, newTitle) {
			var $item = $('.conv-item[data-id="' + conversationId + '"]');
			if ($item.length) {
				// 已存在：更新标题和消息数
				$item.find('.conv-title').contents().first().replaceWith(escapeHtml(newTitle));
				var curCount = parseInt($item.find('.conv-meta').text()) || 0;
				$item.find('.conv-meta').text((curCount + 2) + '条消息 · 刚刚');
			} else {
				// 新会话不在列表中：重新加载列表（仿FastGPT loadHistories({init:true})）
				loadConversations();
			}
		}

		// ==================== 初始化 ====================
		$(function() {
			loadConversations();
			$('#userInput').focus();
			// 从 sessionStorage 恢复上次的会话ID（仿FastGPT useChatStore）
			var savedId = sessionStorage.getItem('ai_currentConvId');
			if (savedId) {
				currentConversationId = parseInt(savedId);
			}
		});

		// ==================== 会话列表管理（左侧边栏） ====================

		/* 加载当前用户的所有会话（仿FastGPT: 加载后自动恢复上次活动会话） */
		function loadConversations() {
			$.ajax({
				url: prefix + '/conversation/list',
				type: 'POST',
				data: {},
				success: function(res) {
					if (res.code == 0) {
						conversations = res.data || [];
						renderConvList(conversations);
						// 页面初始化时，如果有保存的会话ID且在列表中存在，自动恢复
						if (currentConversationId && !$('#chatArea .chat-message').length) {
							var found = conversations.find(function(c) { return c.conversationId == currentConversationId; });
							if (found) {
								switchConversation(currentConversationId);
							} else {
								currentConversationId = null;
								sessionStorage.removeItem('ai_currentConvId');
							}
						}
					}
				}
			});
		}

		/* 渲染左侧会话列表（仿FastGPT ChatSliderList: 支持置顶标记、自定义标题优先） */
		function renderConvList(list) {
			var container = $('#convList');
			container.empty();
			if (!list || list.length === 0) {
				container.html('<div class="conv-empty"><i class="fa fa-comments" style="font-size:24px;display:block;margin-bottom:10px;"></i>暂无对话记录<br/>点击上方按钮开始新对话</div>');
				return;
			}
			for (var i = 0; i < list.length; i++) {
				var c = list[i];
				var isActive = (currentConversationId == c.conversationId);
				var isPinned = (c.top && c.top > 0);
				var time = c.lastMessageTime || c.createTime || '';
				if (time) {
					try { time = time.substring(5, 16); } catch(e) {}
				}
				var msgCount = c.messageCount || 0;
				// 仿FastGPT: customTitle优先于title
				var displayTitle = c.customTitle || c.title || '新对话';
				var pinIcon = isPinned ? '<i class="fa fa-thumb-tack" style="color:#f9e2af;margin-left:4px;font-size:10px;"></i>' : '';
				var pinAction = isPinned
					? '<a class="pin" href="javascript:void(0)" onclick="event.stopPropagation();togglePinConversation(' + c.conversationId + ',0)" title="取消置顶"><i class="fa fa-thumb-tack"></i></a>'
					: '<a class="pin" href="javascript:void(0)" onclick="event.stopPropagation();togglePinConversation(' + c.conversationId + ',1)" title="置顶"><i class="fa fa-thumb-tack"></i></a>';
				var classes = 'conv-item' + (isActive ? ' active' : '') + (isPinned ? ' pinned' : '');
				var html = '<div class="' + classes + '" data-id="' + c.conversationId + '" onclick="switchConversation(' + c.conversationId + ')">' 
					+ '<div class="conv-icon"><i class="fa fa-comment"></i></div>'
					+ '<div class="conv-info">'
					+ '<div class="conv-title">' + escapeHtml(displayTitle) + pinIcon + '</div>'
					+ '<div class="conv-meta">' + msgCount + '条消息 · ' + time + '</div>'
					+ '</div>'
					+ '<div class="conv-actions">'
					+ pinAction
					+ '<a class="edit" href="javascript:void(0)" onclick="event.stopPropagation();renameConversation(' + c.conversationId + ')" title="重命名"><i class="fa fa-pencil"></i></a>'
					+ '<a href="javascript:void(0)" onclick="event.stopPropagation();deleteConversation(' + c.conversationId + ')" title="删除"><i class="fa fa-trash"></i></a>'
					+ '</div></div>';
				container.append(html);
			}
		}

		/* 搜索过滤会话（仿FastGPT: 同时搜索title和customTitle） */
		function filterConversations() {
			var keyword = $('#convSearch').val().trim().toLowerCase();
			if (!keyword) {
				renderConvList(conversations);
				return;
			}
			var filtered = conversations.filter(function(c) {
				return (c.title || '').toLowerCase().indexOf(keyword) >= 0
					|| (c.customTitle || '').toLowerCase().indexOf(keyword) >= 0;
			});
			renderConvList(filtered);
		}

		/* 新建对话（仿FastGPT: 不调后端，只重置前端状态，第一次发消息时后端自动创建） */
		function createNewChat() {
			// 仿FastGPT: 切换前保存当前聊天到缓存
			saveCurrentChatToCache();
			currentConversationId = null;
			sessionStorage.removeItem('ai_currentConvId');
			// 清空右侧，显示欢迎消息
			$('#chatArea').empty();
			$('#chatArea').html('<div class="welcome-page" id="welcomePage"><div class="welcome-icon"><i class="fa fa-robot"></i></div><h3>新对话</h3><p>请直接输入问题开始对话。<br/>第一条消息将自动成为对话标题。</p></div>');
			$('#currentTitle').html('<i class="fa fa-comments"></i> 新对话');
			// 重置流程状态
			analysisHistory = {};
			uploadedFileInfo = null;
			$('#fileInfo').html('(支持 PDF/Word/Excel/图片/TXT，最大20MB)');
			$('#fileUpload').val('');
			// 取消左侧高亮
			$('.conv-item').removeClass('active');
			$('#userInput').focus();
		}

		/* 切换会话（仿FastGPT: 保存到sessionStorage实现tab内持久化 + 消息缓存） */
		function switchConversation(conversationId) {
			if (isProcessing) return;
			if (currentConversationId == conversationId) return; // 已在当前会话
			// 仿FastGPT: 切换前保存当前聊天到缓存
			saveCurrentChatToCache();
			currentConversationId = conversationId;
			sessionStorage.setItem('ai_currentConvId', conversationId);
			// 高亮当前会话
			$('.conv-item').removeClass('active');
			$('.conv-item[data-id="' + conversationId + '"]').addClass('active');
			// 更新标题（仿FastGPT: customTitle优先）
			var conv = conversations.find(function(c) { return c.conversationId == conversationId; });
			if (conv) {
				$('#currentTitle').html('<i class="fa fa-comments"></i> ' + escapeHtml(conv.customTitle || conv.title || '新对话'));
			}
			// 重置流程状态
			analysisHistory = {};
			uploadedFileInfo = null;
			$('#fileInfo').html('(支持 PDF/Word/Excel/图片/TXT，最大20MB)');
			$('#fileUpload').val('');
			// 仿FastGPT chatRecordContext: 优先从缓存恢复，没缓存则从API加载
			if (!restoreFromCache(conversationId)) {
				loadMessages(conversationId);
			}
		}

		/* 加载会话消息（仿FastGPT chatRecordContext: 加载后缓存到messageCache） */
		function loadMessages(conversationId) {
			$('#chatArea').empty();
			$('#welcomePage').remove();
			showTyping();
			$.ajax({
				url: prefix + '/conversation/messages',
				type: 'POST',
				data: { conversationId: conversationId },
				success: function(res) {
					hideTyping();
					$('#chatArea').empty();
					if (res.code == 0 && res.data && res.data.length > 0) {
						var msgs = res.data;
						for (var i = 0; i < msgs.length; i++) {
							var role = msgs[i].role === '0' ? 'user' : 'ai';
							appendMessage(role, msgs[i].content);
						}
						// 仿FastGPT: 加载后缓存，下次切换回来直接从缓存恢复
						messageCache[conversationId] = $('#chatArea').html();
					} else {
						appendMessage('ai', '会话已就绪，请输入消息开始对话。');
					}
				},
				error: function() {
					hideTyping();
					appendMessage('ai', '加载消息失败，请重试。');
				}
			});
		}

		/* 删除会话（仿FastGPT onDelHistory: 乐观删除 + 清理缓存） */
		function deleteConversation(conversationId) {
			layer.confirm('确认删除该会话？所有消息将被清除。', {icon: 3, title: '提示'}, function(index) {
				$.ajax({
					url: prefix + '/conversation/delete',
					type: 'POST',
					data: { conversationId: conversationId },
					success: function(res) {

		// ==================== 消息发送 ====================

		/* 发送消息（仿FastGPT: 无需预创建会话，后端惰性创建） */
		function sendMessage() {
			var msg = $('#userInput').val().trim();
			var fileText = (uploadedFileInfo && uploadedFileInfo.text) ? uploadedFileInfo.text : null;

			if ((!msg && !fileText) || isProcessing) return;

			// 不再需要预创建会话，后端会自动创建
			$('#welcomePage').remove();

			// 构造显示消息
			var displayMsg = msg;
			if (fileText && msg) {
				displayMsg = msg + '\n\n[附件：' + (uploadedFileInfo.fileName || '文件') + ']';
			} else if (fileText && !msg) {
				displayMsg = '[附件内容：' + (uploadedFileInfo.fileName || '文件') + ']\n\n' + (fileText.length > 200 ? fileText.substring(0, 200) + '...' : fileText);
			}
			appendMessage('user', displayMsg);

			// 构造实际发送的内容
			var sendContent = '';
			if (fileText) {
				sendContent = fileText;
				if (msg) sendContent = msg + '\n\n--- 附件内容 ---\n' + fileText;
			} else {
				sendContent = msg;
			}

			// 清空输入框和上传文件
			$('#userInput').val('');
			if (uploadedFileInfo) {
				uploadedFileInfo = null;
				$('#fileInfo').html('(支持 PDF/Word/Excel/图片/TXT，最大20MB)');
				$('#fileUpload').val('');
			}

			// 保存为需求文档（流程使用）
			if (!analysisHistory['1.1'] && sendContent.length > 50) {
				analysisHistory['1.1'] = sendContent;
			}

			// 仿FastGPT: 选择流式或普通模式（长消息自动降级POST，避免GET URL过长）
			if (useStreamMode && sendContent.length <= 2000) {
				callAiChatStream(sendContent);
			} else {
				callAiChat(sendContent);
			}
		}

		/* 键盘事件 */

				e.preventDefault();

		}

		// ==================== AI聊天（带会话持久化） ====================

		/* 调用AI聊天（仿FastGPT: 后端自动创建会话 + 乐观更新侧边栏） */
		function callAiChat(message) {
			var isNewChat = !currentConversationId;
			isProcessing = true;
			$('#btnSend').prop('disabled', true);
			$('#modelInfo').text('DeepSeek V3 | 思考中...');
			showTyping();

			var postData = { content: message };
			if (currentConversationId) {
				postData.conversationId = currentConversationId;
			}

			$.ajax({
				url: prefix + '/chat/conversation',
				type: 'POST',
				data: postData,
				timeout: 180000,
				success: function(res) {
					hideTyping();
					if (res.code == 0 && res.data) {
						var data = res.data;
						var answer = data.answer || '';

						// 后端返回实际的conversationId（惰性创建时是新生成的）
						if (data.conversationId) {
							currentConversationId = data.conversationId;
							sessionStorage.setItem('ai_currentConvId', currentConversationId);
						}

						appendMessage('ai', answer);
						analysisHistory[currentConversationId + '_last'] = answer;

						// 更新模型信息
						var info = '';
						if (data.model) info += data.model;
						if (data.costTime) info += ' | ' + (data.costTime / 1000).toFixed(1) + 's';
						$('#modelInfo').text(info + ' | 就绪');

						// 更新消息缓存
						if (currentConversationId) {
							messageCache[currentConversationId] = $('#chatArea').html();
						}
						// 仿FastGPT onUpdateHistoryTitle: 乐观更新侧栏
						if (isNewChat && currentConversationId) {
							var autoTitle = message.substring(0, 30) + (message.length > 30 ? '...' : '');
							$('#currentTitle').html('<i class="fa fa-comments"></i> ' + escapeHtml(autoTitle));
							onUpdateHistoryTitle(currentConversationId, autoTitle);
						} else if (currentConversationId) {
							onUpdateHistoryTitle(currentConversationId, message.substring(0, 30));
						}
					} else {
						appendMessage('ai', '错误：' + (res.msg || '未知错误'));
					}
				},
				error: function(xhr, status, error) {
					hideTyping();
					if (status === 'timeout') {
						appendMessage('ai', '请求超时，请稍后重试。建议缩短输入内容长度。');
					} else {
						appendMessage('ai', '网络错误：' + error);
					}
				},
				complete: function() {
					isProcessing = false;
					$('#btnSend').prop('disabled', false);
					$('#modelInfo').text('DeepSeek V3 | 就绪');
				}
			});
		}

		/* SSE流式AI聊天（仿FastGPT streamFetch + animateResponseText: requestAnimationFrame动画队列） */
		function callAiChatStream(message) {
			var isNewChat = !currentConversationId;
			isProcessing = true;
			$('#btnSend').prop('disabled', true);
			$('#modelInfo').text('DeepSeek V3 | 思考中...');

			$('#welcomePage').remove();
			var bubbleId = 'stream-bubble-' + Date.now();
			var icon = '<i class="fa fa-robot"></i>';
			var html = '<div class="chat-message ai">'
				+ '<div class="avatar">' + icon + '</div>'
				+ '<div class="bubble" id="' + bubbleId + '"><div class="typing-indicator"><span></span><span></span><span></span></div></div>'
				+ '</div>';
			$('#chatArea').append(html);
			scrollToBottom();

			var url = prefix + '/chat/stream/conversation?message=' + encodeURIComponent(message);
			if (currentConversationId) {
				url += '&conversationId=' + currentConversationId;
			}

			var fullText = '';
			var responseQueue = []; // 仿FastGPT: 消息队列
			var finished = false;
			var bubbleEl = document.getElementById(bubbleId);

			var lastRenderTime = 0;
			if (bubbleEl) bubbleEl.classList.add('streaming');

			// 仿FastGPT animateResponseText: 节流渲染 + 缓冲不完整表格行
			function animateResponseText() {
				if (responseQueue.length > 0) {
					var batchSize = Math.max(1, Math.round(responseQueue.length / 30));
					for (var i = 0; i < batchSize && i < responseQueue.length; i++) {
						fullText += responseQueue[i];
					}
					responseQueue = responseQueue.slice(batchSize);
					// 节流：最多每100ms渲染一次，防止表格抖动
					var now = Date.now();
					if (now - lastRenderTime >= 100) {
						lastRenderTime = now;
						if (bubbleEl) bubbleEl.innerHTML = formatMarkdown(trimIncompleteTable(fullText));
						if (!userScrolledUp) scrollToBottom();
					}
				}
				if (finished && responseQueue.length === 0) {
					// 最终渲染（完整文本，不裁剪）
					if (bubbleEl) {
						bubbleEl.classList.remove('streaming');
						bubbleEl.innerHTML = formatMarkdown(fullText);
					}
					scrollToBottom();
					return;
				}
				requestAnimationFrame(animateResponseText);
			}
			requestAnimationFrame(animateResponseText);

			var eventSource = new EventSource(url);

			eventSource.addEventListener('conversationId', function(e) {
				var newConvId = parseInt(e.data);
				if (newConvId) {
					currentConversationId = newConvId;
					sessionStorage.setItem('ai_currentConvId', currentConversationId);
					if (isNewChat) {
						var autoTitle = message.substring(0, 30) + (message.length > 30 ? '...' : '');
						$('#currentTitle').html('<i class="fa fa-comments"></i> ' + escapeHtml(autoTitle));
					}
				}
			});

			eventSource.onmessage = function(e) {
				responseQueue.push(e.data);
				$('#modelInfo').text('DeepSeek V3 | 生成中...');
			};

			eventSource.addEventListener('done', function(e) {
				eventSource.close();
				finished = true;
				// 立即消费剩余队列
				while (responseQueue.length > 0) {
					fullText += responseQueue.shift();
				}
				if (bubbleEl) bubbleEl.innerHTML = formatMarkdown(fullText);
				scrollToBottom();
				analysisHistory[currentConversationId + '_last'] = fullText;
				if (currentConversationId) {
					messageCache[currentConversationId] = $('#chatArea').html();
				}
				$('#modelInfo').text('DeepSeek V3 | 就绪');
				isProcessing = false;
				$('#btnSend').prop('disabled', false);
				if (isNewChat && currentConversationId) {
					var autoTitle = message.substring(0, 30) + (message.length > 30 ? '...' : '');
					onUpdateHistoryTitle(currentConversationId, autoTitle);
				} else if (currentConversationId) {
					onUpdateHistoryTitle(currentConversationId, message.substring(0, 30));
				}
			});

			eventSource.onerror = function(e) {
				eventSource.close();
				finished = true;
				while (responseQueue.length > 0) {
					fullText += responseQueue.shift();
				}
				if (!fullText) {
					if (bubbleEl) bubbleEl.innerHTML = '<span style="color:#e74c3c;">连接中断，请刷新对话查看已保存的内容。</span>';
				} else {
					if (bubbleEl) bubbleEl.innerHTML = formatMarkdown(fullText);
					if (currentConversationId) {
						messageCache[currentConversationId] = $('#chatArea').html();
					}
				}
				$('#modelInfo').text('DeepSeek V3 | 就绪');
				isProcessing = false;
				$('#btnSend').prop('disabled', false);
				if (isNewChat && currentConversationId) {
					onUpdateHistoryTitle(currentConversationId, message.substring(0, 30));
				}
			};
		}

		// ==================== 快捷操作（需求分析流程） ====================

		function quickAction(action) {

			if (action === 'analyze') {

				if (!doc) { layer.msg('请先上传文件或在输入框输入需求文档', {icon: 5}); return; }

			}
			else if (action === 'adapt') {
				var prev = analysisHistory['1.3'];
				if (!prev) { layer.msg('请先执行"提取关键信息"', {icon: 5}); return; }
				appendMessage('user', '请进行RuoYi适配分析');
				isProcessing = true; $('#btnSend').prop('disabled', true);
				pipelineStep('adapt', prev, '1.4', 'RuoYi适配分析', function() { pipelineComplete(); });
			}
			else if (action === 'evaluate') {
				var prev = (analysisHistory['1.3'] || '') + '\n\n' + (analysisHistory['1.4'] || '');
				if (!analysisHistory['1.3']) { layer.msg('请先执行"提取关键信息"', {icon: 5}); return; }
				appendMessage('user', '请进行完整性评估');
				isProcessing = true; $('#btnSend').prop('disabled', true);
				pipelineStep('evaluate', prev, '1.5', '完整性评估', function() { pipelineComplete(); });

			else if (action === 'report') {

				if (!analysisHistory['1.5']) { layer.msg('请先执行"完整性评估"', {icon: 5}); return; }
				appendMessage('user', '请生成需求完整性报告');
				isProcessing = true; $('#btnSend').prop('disabled', true);

				var doc = getDocContent();

						fullText += responseQueue[i];
					}
					responseQueue = responseQueue.slice(batchSize);
					var now = Date.now();
					if (now - lastRenderTime >= 100) {
						lastRenderTime = now;
						if (bubbleEl) bubbleEl.innerHTML = '<b>' + stepName + '</b><br><br>' + formatMarkdown(trimIncompleteTable(fullText));
						if (!userScrolledUp) scrollToBottom();
					}
				}
				if (animFinished && responseQueue.length === 0) {
					if (bubbleEl) bubbleEl.classList.remove('streaming');
					return;
				}
				requestAnimationFrame(animateResponseText);
			}
			requestAnimationFrame(animateResponseText);

			eventSource.onmessage = function(e) {
				responseQueue.push(e.data);
			};

			eventSource.addEventListener('done', function(e) {
				if (closed) return;
				closed = true;
				animFinished = true;
				eventSource.close();
				while (responseQueue.length > 0) { fullText += responseQueue.shift(); }
				var doneText = e.data || fullText;
				analysisHistory[stepKey] = doneText;
				if (bubbleEl) bubbleEl.innerHTML = '<b>' + stepName + ' ✅</b><br><br>' + formatMarkdown(doneText);
				scrollToBottom();
				$('#modelInfo').text('DeepSeek V3 | ' + stepName + ' 完成');
				savePipelineMessage(stepName, inputData, doneText);
				if (currentConversationId) {
					messageCache[currentConversationId] = $('#chatArea').html();
				}
				if (onSuccess) onSuccess();
			});

			eventSource.addEventListener('error', function(e) {
				if (closed) return;
				closed = true;
				animFinished = true;
				eventSource.close();
				while (responseQueue.length > 0) { fullText += responseQueue.shift(); }
				if (fullText) {
					analysisHistory[stepKey] = fullText;
					if (bubbleEl) bubbleEl.innerHTML = '<b>' + stepName + ' ⚠️ (部分完成)</b><br><br>' + formatMarkdown(fullText);
					savePipelineMessage(stepName, inputData, fullText);
					if (currentConversationId) {
						messageCache[currentConversationId] = $('#chatArea').html();
					}
					if (onSuccess) onSuccess();
				} else {
					if (bubbleEl) bubbleEl.innerHTML = '<span style="color:#e74c3c;">' + stepName + ' 流式连接失败</span>';
					pipelineComplete();
				}
			});

			eventSource.onerror = function(e) {
				if (closed) return;
				closed = true;
				animFinished = true;
				eventSource.close();
				while (responseQueue.length > 0) { fullText += responseQueue.shift(); }
				if (fullText) {
					analysisHistory[stepKey] = fullText;
					if (bubbleEl) bubbleEl.innerHTML = '<b>' + stepName + ' ⚠️</b><br><br>' + formatMarkdown(fullText);
					savePipelineMessage(stepName, inputData, fullText);
					if (currentConversationId) {
						messageCache[currentConversationId] = $('#chatArea').html();
					}
					if (onSuccess) onSuccess();
				} else {
					if (bubbleEl) bubbleEl.innerHTML = '<span style="color:#e74c3c;">' + stepName + ' 连接中断</span>';
					pipelineComplete();
				}
				$('#modelInfo').text('DeepSeek V3 | 就绪');
			};
		}

		/* 异步保存pipeline消息到会话（不阻塞流程） */
		function savePipelineMessage(stepName, inputData, aiReply) {
			var saveData = {
				userMessage: '[' + stepName + '] ' + (inputData || '').substring(0, 200),
				aiReply: aiReply
			};
			if (currentConversationId) saveData.conversationId = currentConversationId;
			$.ajax({
				url: prefix + '/conversation/saveMessages',
				type: 'POST',
				data: saveData,
				success: function(saveRes) {
					if (saveRes.code == 0 && saveRes.data && saveRes.data.conversationId) {
						if (!currentConversationId) {
							currentConversationId = saveRes.data.conversationId;
							sessionStorage.setItem('ai_currentConvId', currentConversationId);
						}
					}
				}
			});
		}

		function pipelineComplete() {
			isProcessing = false;
			$('#btnSend').prop('disabled', false);
			$('#modelInfo').text('DeepSeek V3 | 就绪');
			// 更新缓存和刷新侧栏
			if (currentConversationId) {
				messageCache[currentConversationId] = $('#chatArea').html();
			}
			loadConversations();
		}

		function callReportApi(analysisData) {
			isProcessing = true;
			$('#btnSend').prop('disabled', true);
			$('#modelInfo').text('DeepSeek V3 | 生成报告...');
			showTyping();

			$.ajax({
				url: prefix + '/report', type: 'POST',
				data: { analysisResult: analysisData }, timeout: 180000,
				success: function(res) {
					hideTyping();
					if (res.code == 0) {
						var report = res.data || res.msg;
						analysisHistory['1.6'] = report;
						appendHtmlMessage('ai', '<b>需求完整性报告</b><br><br>' + formatMarkdown(report)
							+ '<br><br><button class="btn btn-sm btn-success" onclick="downloadWordReport()" style="margin-top:10px;"><i class="fa fa-download"></i> 下载Word报告</button>');
					} else {
						appendMessage('ai', '报告生成失败：' + res.msg);
					}
				},
				error: function(xhr, status, error) {
					hideTyping();
					appendMessage('ai', '报告生成请求失败');
				},
				complete: function() {
					isProcessing = false;
					$('#btnSend').prop('disabled', false);
					$('#modelInfo').text('DeepSeek V3 | 就绪');
				}
			});
		}

		function downloadWordReport() {
			var report = analysisHistory['1.6'];
			if (!report) { layer.msg('请先生成完整性报告', {icon: 5}); return; }
			var form = document.createElement('form');
			form.method = 'POST';
			form.action = prefix + '/report/download';
			form.style.display = 'none';
			var inp = document.createElement('input');
			inp.type = 'hidden'; inp.name = 'reportContent'; inp.value = report;
			form.appendChild(inp);
			document.body.appendChild(form);
			form.submit();
			document.body.removeChild(form);
		}

		// ==================== 文件上传 ====================

		function handleFileUpload(input) {
			var file = input.files[0];
			if (!file) return;

			if (file.size > 20 * 1024 * 1024) {
				layer.msg('文件大小不能超过20MB', {icon: 5});
				input.value = '';
				return;
			}

			var ext = file.name.split('.').pop().toLowerCase();
			var allowed = ['pdf','doc','docx','xls','xlsx','txt','md','png','jpg','jpeg','gif','bmp','webp'];
			if (allowed.indexOf(ext) === -1) {
				layer.msg('不支持的文件格式：' + ext, {icon: 5});
				input.value = '';
				return;
			}

			$('#fileInfo').html('<i class="fa fa-spinner fa-spin"></i> 正在解析 ' + file.name + ' ...');
			$('#btnSend').prop('disabled', true);

			var formData = new FormData();
			formData.append('file', file);

			$.ajax({
				url: prefix + '/upload', type: 'POST',
				data: formData, processData: false, contentType: false, timeout: 120000,
				success: function(res) {
					if (res.code == 0) {
						var data = res.data;
						var text = data.text;
						var fileName = data.fileName || file.name;
						var storedName = data.storedName;
						var fileSize = data.fileSize || file.size;

						uploadedFileInfo = { fileName: fileName, storedName: storedName, fileSize: fileSize, text: text };
						analysisHistory['1.1'] = text;

						var downloadUrl = prefix + '/download?storedName=' + encodeURIComponent(storedName) + '&fileName=' + encodeURIComponent(fileName);
						// 只在聊天区显示简洁通知，不显示原始HTML/预览内容
						appendMessage('ai', '文件 "' + fileName + '" 解析成功，共 ' + text.length + ' 字符。\n\n文件已就绪，请在输入框中输入问题后点击「发送」开始对话，或点击快捷按钮进行需求分析。');

						$('#fileInfo').html('<a href="' + downloadUrl + '" style="color:#1ab394;" title="点击下载"><i class="fa fa-file"></i> ' + fileName + ' (' + formatFileSize(fileSize) + ')</a>'
							+ ' <span class="remove-file" onclick="clearFile()"><i class="fa fa-times"></i></span>');
					} else {
						appendMessage('ai', '文件解析失败：' + res.msg);
						$('#fileInfo').html('(支持 PDF/Word/Excel/图片/TXT，最大20MB)');
						uploadedFileInfo = null;
					}
				},
				error: function(xhr, status, error) {
					appendMessage('ai', '文件上传失败：' + (status === 'timeout' ? '请求超时' : error));
					$('#fileInfo').html('(支持 PDF/Word/Excel/图片/TXT，最大20MB)');
					uploadedFileInfo = null;
				},
				complete: function() {
					$('#btnSend').prop('disabled', false);
					input.value = '';
				}
			});
		}

		function clearFile() {
			delete analysisHistory['1.1'];
			uploadedFileInfo = null;
			$('#fileInfo').html('(支持 PDF/Word/Excel/图片/TXT，最大20MB)');
			$('#fileUpload').val('');
			layer.msg('已清除', {icon: 1});
		}

		// ==================== 工具函数 ====================

		function formatFileSize(bytes) {
			if (bytes < 1024) return bytes + 'B';
			if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + 'KB';
			return (bytes / (1024 * 1024)).toFixed(1) + 'MB';
		}

		function escapeHtml(str) {
			if (!str) return '';
			return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
		}

		function formatMarkdown(text) {
			if (!text) return '';

			// 1. 提取代码块，用占位符保护（避免被后续处理破坏）
			var codeBlocks = [];
			text = text.replace(/```(\w*)\n([\s\S]*?)```/g, function(m, lang, code) {
				var idx = codeBlocks.length;
				codeBlocks.push('<pre><code>' + code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code></pre>');
				return '%%CODEBLOCK_' + idx + '%%';
			});

			// 2. 提取行内代码
			var inlineCodes = [];
			text = text.replace(/`([^`]+)`/g, function(m, code) {
				var idx = inlineCodes.length;
				inlineCodes.push('<code>' + code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>');
				return '%%INLINE_' + idx + '%%';
			});

			// 3. 将AI可能输出的<br>/<br/>标签先统一为换行符
			text = text.replace(/<br\s*\/?>/gi, '\n');

			// 4. 转义HTML（此时代码块和行内代码已被占位符保护）
			text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

			// 5. Markdown语法转换
			text = text.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
			text = text.replace(/\*(.+?)\*/g, '<i>$1</i>');
			text = text.replace(/^#{3}\s+(.+)$/gm, '<h5 style="margin:8px 0 4px;font-size:14px;">$1</h5>');
			text = text.replace(/^#{2}\s+(.+)$/gm, '<h4 style="margin:10px 0 6px;font-size:15px;">$1</h4>');
			text = text.replace(/^#{1}\s+(.+)$/gm, '<h3 style="margin:12px 0 8px;">$1</h3>');
			text = text.replace(/^---+$/gm, '<hr style="margin:8px 0;border:none;border-top:1px solid #ddd;">');
			text = text.replace(/^\d+\.\s+(.+)$/gm, function(m, content) { return '<div style="margin-left:16px;">' + m + '</div>'; });
			text = text.replace(/^[-*]\s+(.+)$/gm, '<div style="margin-left:16px;">• $1</div>');

			// 6. 表格处理
			text = formatTables(text);

			// 7. 普通换行转<br>（但不影响已有HTML标签的换行）
			text = text.replace(/\n/g, '<br>');
			// 清理多余连续<br>
			text = text.replace(/(<br>){3,}/g, '<br><br>');

			// 8. 还原代码块和行内代码
			for (var i = 0; i < codeBlocks.length; i++) {
				text = text.replace('%%CODEBLOCK_' + i + '%%', codeBlocks[i]);
			}
			for (var i = 0; i < inlineCodes.length; i++) {
				text = text.replace('%%INLINE_' + i + '%%', inlineCodes[i]);
			}

			return text;
		}

		// 流式渲染时裁剪不完整的表格行，防止表格抖动
		function trimIncompleteTable(text) {
			if (!text) return text;
			var lines = text.split('\n');
			// 从末尾往回找：如果最后一行是不完整的表格行（以|开头但不以|结尾），去掉它
			while (lines.length > 0) {
				var last = lines[lines.length - 1].trim();
				if (last.length > 0 && last.charAt(0) === '|' && last.charAt(last.length - 1) !== '|') {
					lines.pop();
				} else {
					break;
				}
			}
			return lines.join('\n');
		}

		function formatTables(text) {
			var lines = text.split('\n');
			var result = [];
			var inTable = false;
			var tableHtml = '';
			for (var i = 0; i < lines.length; i++) {
				var line = lines[i].trim();
				if (line.match(/^\|.*\|$/)) {
					if (!inTable) { inTable = true; tableHtml = '<div class="table-wrap"><table>'; }
					if (line.match(/^\|[\s\-:|]+\|$/)) continue;
					var cells = line.split('|').filter(function(c) { return c.trim() !== ''; });
					var tag = (tableHtml === '<div class="table-wrap"><table>') ? 'th' : 'td';
					tableHtml += '<tr>';
					for (var j = 0; j < cells.length; j++) {
						tableHtml += '<' + tag + '>' + cells[j].trim() + '</' + tag + '>';
					}
					tableHtml += '</tr>';
				} else {
					if (inTable) { tableHtml += '</table></div>'; result.push(tableHtml); inTable = false; tableHtml = ''; }
					result.push(line);
				}
			}
			if (inTable) { tableHtml += '</table></div>'; result.push(tableHtml); }
			return result.join('\n');
		}
