<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
	<th:block th:include="include :: header('修改Dify应用')" />
</head>
<body class="white-bg">
	<div class="wrapper wrapper-content animated fadeInRight ibox-content">
		<form class="form-horizontal m" id="form-app-edit" th:object="${aiDifyApp}">
			<input name="appId" th:field="*{appId}" type="hidden">
			<div class="form-group">
				<label class="col-sm-3 control-label is-required">关联配置：</label>
				<div class="col-sm-8">
					<select name="configId" class="form-control" required>
						<option th:each="config : ${configs}" th:text="${config.configName}" th:value="${config.configId}" th:selected="${config.configId} == *{configId}"></option>
					</select>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label is-required">应用名称：</label>
				<div class="col-sm-8">
					<input name="appName" th:field="*{appName}" class="form-control" type="text" required>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label">应用类型：</label>
				<div class="col-sm-8">
					<select name="appType" class="form-control" th:with="type=${@dict.getType('ai_dify_app_type')}">
						<option th:each="dict : ${type}" th:text="${dict.dictLabel}" th:value="${dict.dictValue}" th:selected="${dict.dictValue} == *{appType}"></option>
					</select>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label">应用API密钥：</label>
				<div class="col-sm-8">
					<div class="input-group">
						<input name="appApiKey" id="appApiKey" class="form-control" type="password" th:placeholder="'当前：' + *{appApiKeyMasked} + '（留空则不修改）'">
						<span class="input-group-btn">
							<button type="button" class="btn btn-default" onclick="toggleApiKey()"><i class="fa fa-eye" id="toggleIcon"></i></button>
						</span>
					</div>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label">工作流ID：</label>
				<div class="col-sm-8">
					<input name="workflowId" th:field="*{workflowId}" class="form-control" type="text">
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label">模型名称：</label>
				<div class="col-sm-8">
					<input name="modelName" th:field="*{modelName}" class="form-control" type="text">
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label">应用描述：</label>
				<div class="col-sm-8">
					<textarea name="description" class="form-control" rows="2" th:field="*{description}"></textarea>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label">显示顺序：</label>
				<div class="col-sm-8">
					<input name="sortOrder" th:field="*{sortOrder}" class="form-control" type="number">
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label">状态：</label>
				<div class="col-sm-8">
					<div class="radio-box">
						<input type="radio" name="status" value="0" th:checked="*{status} == '0'"> 正常
						<input type="radio" name="status" value="1" th:checked="*{status} == '1'"> 停用
					</div>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label">备注：</label>
				<div class="col-sm-8">
					<textarea name="remark" class="form-control" rows="2" th:field="*{remark}"></textarea>
				</div>
			</div>
		</form>
	</div>
	<th:block th:include="include :: footer" />
	<script th:inline="javascript">
		var prefix = ctx + "ai/dify/app";
		$("#form-app-edit").validate({
			focusCleanup: true
		});

		function submitHandler() {
			if ($.validate.form()) {
				$.operate.save(prefix + "/edit", $('#form-app-edit').serialize());
			}
		}

		function toggleApiKey() {
			var input = $('#appApiKey');
			var icon = $('#toggleIcon');
			if (input.attr('type') === 'password') {
				input.attr('type', 'text');
				icon.removeClass('fa-eye').addClass('fa-eye-slash');
			} else {
				input.attr('type', 'password');
				icon.removeClass('fa-eye-slash').addClass('fa-eye');
			}
		}
	</script>
</body>
</html>
