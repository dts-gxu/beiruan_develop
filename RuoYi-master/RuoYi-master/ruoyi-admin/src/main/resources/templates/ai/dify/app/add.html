<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
	<th:block th:include="include :: header('新增Dify应用')" />
</head>
<body class="white-bg">
	<div class="wrapper wrapper-content animated fadeInRight ibox-content">
		<form class="form-horizontal m" id="form-app-add">
			<div class="form-group">
				<label class="col-sm-3 control-label is-required">关联配置：</label>
				<div class="col-sm-8">
					<select name="configId" id="configId" class="form-control" required>
						<option value="">请选择配置</option>
						<option th:each="config : ${configs}" th:text="${config.configName}" th:value="${config.configId}"></option>
					</select>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label is-required">应用名称：</label>
				<div class="col-sm-8">
					<input name="appName" class="form-control" type="text" required placeholder="例如：智能客服助手">
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label">应用类型：</label>
				<div class="col-sm-8">
					<select name="appType" class="form-control" th:with="type=${@dict.getType('ai_dify_app_type')}">
						<option th:each="dict : ${type}" th:text="${dict.dictLabel}" th:value="${dict.dictValue}"></option>
					</select>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label is-required">应用API密钥：</label>
				<div class="col-sm-8">
					<div class="input-group">
						<input name="appApiKey" id="appApiKey" class="form-control" type="password" required placeholder="app-xxxxxxxx">
						<span class="input-group-btn">
							<button type="button" class="btn btn-default" onclick="toggleApiKey()"><i class="fa fa-eye" id="toggleIcon"></i></button>
						</span>
					</div>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label">工作流ID：</label>
				<div class="col-sm-8">
					<input name="workflowId" class="form-control" type="text" placeholder="Workflow类型填写">
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label">模型名称：</label>
				<div class="col-sm-8">
					<input name="modelName" class="form-control" type="text" placeholder="例如：gpt-4、deepseek-chat">
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label">应用描述：</label>
				<div class="col-sm-8">
					<textarea name="description" class="form-control" rows="2"></textarea>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label">显示顺序：</label>
				<div class="col-sm-8">
					<input name="sortOrder" class="form-control" type="number" value="0">
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label">状态：</label>
				<div class="col-sm-8">
					<div class="radio-box">
						<input type="radio" name="status" value="0" checked> 正常
						<input type="radio" name="status" value="1"> 停用
					</div>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label">备注：</label>
				<div class="col-sm-8">
					<textarea name="remark" class="form-control" rows="2"></textarea>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label"></label>
				<div class="col-sm-8">
					<button type="button" class="btn btn-info" onclick="testApiKey()"><i class="fa fa-key"></i> 验证密钥</button>
					<span id="testResult" style="margin-left:10px;"></span>
				</div>
			</div>
		</form>
	</div>
	<th:block th:include="include :: footer" />
	<script th:inline="javascript">
		var prefix = ctx + "ai/dify/app";
		$("#form-app-add").validate({
			focusCleanup: true
		});

		function submitHandler() {
			if ($.validate.form()) {
				$.operate.save(prefix + "/add", $('#form-app-add').serialize());
			}
		}

		function toggleApiKey() {
			var input = $('#appApiKey');
			var icon = $('#toggleIcon');
			if (input.attr('type') === 'password') {
				input.attr('type', 'text');
				icon.removeClass('fa-eye').addClass('fa-eye-slash');
			} else {
				input.attr('type', 'password');
				icon.removeClass('fa-eye-slash').addClass('fa-eye');
			}
		}

		function testApiKey() {
			var configId = $("#configId").val();
			var appApiKey = $("#appApiKey").val();
			if (!configId) {
				$.modal.msgWarning("请先选择关联配置");
				return;
			}
			if (!appApiKey) {
				$.modal.msgWarning("请先填写应用API密钥");
				return;
			}
			$('#testResult').html('<i class="fa fa-spinner fa-spin"></i> 验证中...');
			$.ajax({
				url: prefix + "/testNewApiKey",
				type: "post",
				data: { configId: configId, appApiKey: appApiKey },
				success: function(result) {
					if (result.code == 0) {
						$('#testResult').html('<span style="color:green"><i class="fa fa-check-circle"></i> 验证成功</span>');
					} else {
						$('#testResult').html('<span style="color:red"><i class="fa fa-times-circle"></i> ' + result.msg + '</span>');
					}
				}
			});
		}
	</script>
</body>
</html>
