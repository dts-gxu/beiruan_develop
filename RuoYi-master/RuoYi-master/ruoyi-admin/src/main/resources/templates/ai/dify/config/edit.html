<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
	<th:block th:include="include :: header('修改Dify配置')" />
</head>
<body class="white-bg">
	<div class="wrapper wrapper-content animated fadeInRight ibox-content">
		<form class="form-horizontal m" id="form-config-edit" th:object="${aiDifyConfig}">
			<input name="configId" th:field="*{configId}" type="hidden">
			<div class="form-group">
				<label class="col-sm-3 control-label is-required">配置名称：</label>
				<div class="col-sm-8">
					<input name="configName" th:field="*{configName}" class="form-control" type="text" required>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label is-required">API地址：</label>
				<div class="col-sm-8">
					<input name="baseUrl" th:field="*{baseUrl}" class="form-control" type="text" required>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label">API密钥：</label>
				<div class="col-sm-8">
					<div class="input-group">
						<input name="apiKey" id="apiKey" class="form-control" type="password" th:placeholder="'当前：' + *{apiKeyMasked} + '（留空则不修改）'">
						<span class="input-group-btn">
							<button type="button" class="btn btn-default" onclick="toggleApiKey()"><i class="fa fa-eye" id="toggleIcon"></i></button>
						</span>
					</div>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label">配置类型：</label>
				<div class="col-sm-8">
					<select name="configType" class="form-control" th:with="type=${@dict.getType('ai_dify_config_type')}">
						<option th:each="dict : ${type}" th:text="${dict.dictLabel}" th:value="${dict.dictValue}" th:selected="${dict.dictValue} == *{configType}"></option>
					</select>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label">是否默认：</label>
				<div class="col-sm-8">
					<label class="toggle-switch">
						<input type="checkbox" name="isDefault" value="Y" th:checked="*{isDefault} == 'Y'">
						<span class="toggle-slider"></span>
					</label>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label">状态：</label>
				<div class="col-sm-8">
					<div class="radio-box">
						<input type="radio" name="status" value="0" th:checked="*{status} == '0'"> 正常
						<input type="radio" name="status" value="1" th:checked="*{status} == '1'"> 停用
					</div>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label">备注：</label>
				<div class="col-sm-8">
					<textarea name="remark" class="form-control" rows="3" th:field="*{remark}"></textarea>
				</div>
			</div>
		</form>
	</div>
	<th:block th:include="include :: footer" />
	<script th:inline="javascript">
		var prefix = ctx + "ai/dify/config";
		$("#form-config-edit").validate({
			focusCleanup: true
		});

		function submitHandler() {
			if ($.validate.form()) {
				$.operate.save(prefix + "/edit", $('#form-config-edit').serialize());
			}
		}

		function toggleApiKey() {
			var input = $('#apiKey');
			var icon = $('#toggleIcon');
			if (input.attr('type') === 'password') {
				input.attr('type', 'text');
				icon.removeClass('fa-eye').addClass('fa-eye-slash');
			} else {
				input.attr('type', 'password');
				icon.removeClass('fa-eye-slash').addClass('fa-eye');
			}
		}
	</script>
</body>
</html>
