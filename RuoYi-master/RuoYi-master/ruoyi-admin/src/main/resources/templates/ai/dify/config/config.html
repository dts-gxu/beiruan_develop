<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<th:block th:include="include :: header('Dify配置管理')" />
</head>
<body class="gray-bg">
	<div class="container-div">
		<div class="row">
			<div class="col-sm-12 search-collapse">
				<form id="formId">
					<div class="select-list">
						<ul>
							<li>
								<label>配置名称：</label>
								<input type="text" name="configName"/>
							</li>
							<li>
								<label>配置类型：</label>
								<select name="configType" th:with="type=${@dict.getType('ai_dify_config_type')}">
									<option value="">所有</option>
									<option th:each="dict : ${type}" th:text="${dict.dictLabel}" th:value="${dict.dictValue}"></option>
								</select>
							</li>
							<li>
								<label>状态：</label>
								<select name="status">
									<option value="">所有</option>
									<option value="0">正常</option>
									<option value="1">停用</option>
								</select>
							</li>
							<li>
								<a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
								<a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
							</li>
						</ul>
					</div>
				</form>
			</div>

			<div class="btn-group-sm" id="toolbar" role="group">
				<a class="btn btn-success" onclick="$.operate.add()" shiro:hasPermission="ai:dify:config:add">
					<i class="fa fa-plus"></i> 添加
				</a>
				<a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="ai:dify:config:edit">
					<i class="fa fa-edit"></i> 修改
				</a>
				<a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="ai:dify:config:remove">
					<i class="fa fa-remove"></i> 删除
				</a>
			</div>
			<div class="col-sm-12 select-table table-striped">
				<table id="bootstrap-table"></table>
			</div>
		</div>
	</div>
	<th:block th:include="include :: footer" />
	<script th:inline="javascript">
		var editFlag = [[${@permission.hasPermi('ai:dify:config:edit')}]];
		var removeFlag = [[${@permission.hasPermi('ai:dify:config:remove')}]];
		var testFlag = [[${@permission.hasPermi('ai:dify:config:test')}]];
		var configTypes = [[${@dict.getType('ai_dify_config_type')}]];
		var prefix = ctx + "ai/dify/config";

		$(function() {
			var options = {
				url: prefix + "/list",
				createUrl: prefix + "/add",
				updateUrl: prefix + "/edit/{id}",
				removeUrl: prefix + "/remove",
				exportUrl: prefix + "/export",
				modalName: "Dify配置",
				columns: [{
					checkbox: true
				},
				{
					field: 'configId',
					title: '配置ID',
					visible: false
				},
				{
					field: 'configName',
					title: '配置名称'
				},
				{
					field: 'baseUrl',
					title: 'API地址'
				},
				{
					field: 'apiKeyMasked',
					title: 'API密钥'
				},
				{
					field: 'configType',
					title: '配置类型',
					formatter: function(value, row, index) {
						return $.table.selectDictLabel(configTypes, value);
					}
				},
				{
					field: 'isDefault',
					title: '默认',
					formatter: function(value, row, index) {
						return value === 'Y' ? '<span class="badge badge-success">是</span>' : '<span class="badge badge-secondary">否</span>';
					}
				},
				{
					field: 'status',
					title: '状态',
					formatter: function(value, row, index) {
						return value === '0' ? '<span class="badge badge-success">正常</span>' : '<span class="badge badge-danger">停用</span>';
					}
				},
				{
					field: 'lastTestResult',
					title: '测试结果',
					formatter: function(value, row, index) {
						if (value === '0') return '<span class="badge badge-success">成功</span>';
						if (value === '1') return '<span class="badge badge-danger">失败</span>';
						return '<span class="badge badge-secondary">未测试</span>';
					}
				},
				{
					title: '操作',
					align: 'center',
					formatter: function(value, row, index) {
						var actions = [];
						if (testFlag) {
							actions.push('<a class="btn btn-info btn-xs" href="javascript:void(0)" onclick="testConnection(\'' + row.configId + '\')"><i class="fa fa-plug"></i>测试</a> ');
						}
						if (editFlag) {
							actions.push('<a class="btn btn-success btn-xs" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.configId + '\')"><i class="fa fa-edit"></i>编辑</a> ');
						}
						if (removeFlag) {
							actions.push('<a class="btn btn-danger btn-xs" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.configId + '\')"><i class="fa fa-remove"></i>删除</a>');
						}
						return actions.join('');
					}
				}]
			};
			$.table.init(options);
		});

		/* 测试连接 */
		function testConnection(configId) {
			$.modal.loading("正在测试连接...");
			$.ajax({
				url: prefix + "/testConnection",
				type: "post",
				data: { configId: configId },
				success: function(result) {
					$.modal.closeLoading();
					if (result.code == 0) {
						$.modal.msgSuccess(result.msg);
					} else {
						$.modal.msgError(result.msg);
					}
					$.table.refresh();
				}
			});
		}
	</script>
</body>
</html>
