<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
	<th:block th:include="include :: header('添加文本文档')" />
</head>
<body class="white-bg">
	<div class="wrapper wrapper-content animated fadeInRight ibox-content">
		<form class="form-horizontal m" id="form-doc-add">
			<input type="hidden" name="kbId" th:value="${kbId}">
			<div class="form-group">
				<label class="col-sm-3 control-label is-required">文档名称：</label>
				<div class="col-sm-8">
					<input name="docName" class="form-control" type="text" required placeholder="请输入文档名称">
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label is-required">文档内容：</label>
				<div class="col-sm-8">
					<textarea name="content" class="form-control" rows="15" required placeholder="请输入或粘贴文档内容（支持Markdown格式）"></textarea>
				</div>
			</div>
		</form>
	</div>
	<th:block th:include="include :: footer" />
	<script th:inline="javascript">
		var prefix = ctx + "ai/knowledge";
		$("#form-doc-add").validate({ focusCleanup: true });

		function submitHandler() {
			if ($.validate.form()) {
				$.operate.save(prefix + "/document/addText", $('#form-doc-add').serialize());
			}
		}
	</script>
</body>
</html>
