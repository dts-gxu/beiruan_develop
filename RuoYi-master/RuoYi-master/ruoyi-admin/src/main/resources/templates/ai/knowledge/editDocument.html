<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
	<th:block th:include="include :: header('编辑文档')" />
</head>
<body class="white-bg">
	<div class="wrapper wrapper-content animated fadeInRight ibox-content">
		<form class="form-horizontal m" id="form-doc-edit" th:object="${doc}">
			<input type="hidden" name="docId" th:field="*{docId}">
			<div class="form-group">
				<label class="col-sm-3 control-label is-required">文档名称：</label>
				<div class="col-sm-8">
					<input name="docName" th:field="*{docName}" class="form-control" type="text" required>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label">文档类型：</label>
				<div class="col-sm-8">
					<input class="form-control" type="text" th:value="*{docType}" readonly>
				</div>
			</div>
			<div class="form-group" th:if="${doc.docType == 'text'}">
				<label class="col-sm-3 control-label is-required">文档内容：</label>
				<div class="col-sm-8">
					<textarea name="content" class="form-control" rows="18" required th:text="*{content}" placeholder="请输入或粘贴文档内容（支持Markdown格式）"></textarea>
				</div>
			</div>
			<div class="form-group" th:if="${doc.docType == 'file'}">
				<label class="col-sm-3 control-label">文件信息：</label>
				<div class="col-sm-8">
					<p class="form-control-static">
						文件大小：<span th:text="${doc.fileSize != null ? (doc.fileSize / 1024) + ' KB' : '未知'}"></span>
					</p>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label">索引状态：</label>
				<div class="col-sm-8">
					<span class="form-control-static badge" th:classappend="${doc.indexingStatus == 'completed' ? 'badge-success' : (doc.indexingStatus == 'error' ? 'badge-danger' : 'badge-warning')}" th:text="*{indexingStatus}"></span>
				</div>
			</div>
			<div class="form-group" th:if="${doc.difyDocumentId != null and doc.difyDocumentId != ''}">
				<label class="col-sm-3 control-label">Dify文档ID：</label>
				<div class="col-sm-8">
					<input class="form-control" type="text" th:value="*{difyDocumentId}" readonly>
				</div>
			</div>
		</form>
	</div>
	<th:block th:include="include :: footer" />
	<script th:inline="javascript">
		var prefix = ctx + "ai/knowledge";
		$("#form-doc-edit").validate({ focusCleanup: true });

		function submitHandler() {
			if ($.validate.form()) {
				$.operate.save(prefix + "/document/edit", $('#form-doc-edit').serialize());
			}
		}
	</script>
</body>
</html>
