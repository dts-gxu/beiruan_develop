<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('新增Dify配置')" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-config-add">
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">配置名称：</label>
                <div class="col-sm-8">
                    <input name="configName" class="form-control" type="text" required placeholder="如：开发环境Dify">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">API地址：</label>
                <div class="col-sm-8">
                    <input name="baseUrl" class="form-control" type="text" required placeholder="如：http://localhost:8180/v1">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">API密钥：</label>
                <div class="col-sm-8">
                    <div class="input-group">
                        <input name="apiKey" id="apiKey" class="form-control" type="password" required placeholder="输入Dify API Key">
                        <span class="input-group-btn">
                            <button type="button" class="btn btn-default" onclick="toggleApiKey()"><i class="fa fa-eye"></i></button>
                        </span>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">配置类型：</label>
                <div class="col-sm-8">
                    <select name="configType" class="form-control" th:with="type=${@dict.getType('ai_config_type')}">
                        <option th:each="dict : ${type}" th:text="${dict.dictLabel}" th:value="${dict.dictValue}"></option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">默认配置：</label>
                <div class="col-sm-8">
                    <label class="toggle-switch">
                        <input type="checkbox" name="isDefault" value="Y">
                        <span class="toggle-slider"></span>
                    </label>
                    <span class="help-block">设为默认后，其他配置将取消默认</span>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">状态：</label>
                <div class="col-sm-8">
                    <div class="radio-box">
                        <input type="radio" name="status" value="0" checked> 正常
                        <input type="radio" name="status" value="1"> 停用
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">备注：</label>
                <div class="col-sm-8">
                    <textarea name="remark" class="form-control" rows="3"></textarea>
                </div>
            </div>
            <div class="form-group">
                <div class="col-sm-offset-3 col-sm-8">
                    <button type="button" class="btn btn-info" onclick="testNewConnection()">
                        <i class="fa fa-plug"></i> 测试连接
                    </button>
                    <span id="testResult" style="margin-left:10px;"></span>
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var prefix = ctx + "ai/dify/config";

        $("#form-config-add").validate({
            focusCleanup: true
        });

        function submitHandler() {
            if ($.validate.form()) {
                $.operate.save(prefix + "/add", $('#form-config-add').serialize());
            }
        }

        function toggleApiKey() {
            var input = document.getElementById('apiKey');
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        function testNewConnection() {
            var baseUrl = $("input[name='baseUrl']").val();
            var apiKey = $("input[name='apiKey']").val();
            if (!baseUrl || !apiKey) {
                layer.msg('请先输入API地址和密钥', {icon: 7});
                return;
            }
            var loadIndex = layer.load(1);
            $.ajax({
                url: prefix + '/testNewConnection',
                type: 'POST',
                data: { baseUrl: baseUrl, apiKey: apiKey },
                success: function(res) {
                    layer.close(loadIndex);
                    if (res.code == 0) {
                        $('#testResult').html('<span class="text-success"><i class="fa fa-check-circle"></i> ' + res.msg + '</span>');
                    } else {
                        $('#testResult').html('<span class="text-danger"><i class="fa fa-times-circle"></i> ' + res.msg + '</span>');
                    }
                },
                error: function() {
                    layer.close(loadIndex);
                    $('#testResult').html('<span class="text-danger"><i class="fa fa-times-circle"></i> 请求失败</span>');
                }
            });
        }
    </script>
</body>
</html>
