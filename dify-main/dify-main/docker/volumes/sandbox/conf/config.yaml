python_path: /usr/local/bin/python3
nodejs_path: /usr/local/bin/node
enable_network: true
proxy:
  socks5: ""
  http: http://ssrf_proxy:3128
  https: http://ssrf_proxy:3128
max_workers: 10
max_requests: 100
worker_timeout: 15
python_lib_paths:
  - /usr/lib/python3
  - /usr/lib/python3.10
  - /usr/local/lib/python3.10
nodejs_lib_paths: []
